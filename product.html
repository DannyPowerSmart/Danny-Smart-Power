<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

img {
  width: 100%;
  border-radius: 12px;
}

h2 {
  margin-top: 15px;
}

.price {
  color: #38bdf8;
  font-size: 20px;
  font-weight: bold;
}

/* QUANTITY */
.qty-box {
  display: flex;
  align-items: center;
  margin-top: 15px;
}

.qty-box button {
  width: 40px;
  height: 40px;
  border: none;
  background: #020617;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.qty-box span {
  margin: 0 15px;
  font-size: 18px;
}

/* BUTTON */
.btn {
  padding: 12px;
  background: #38bdf8;
  border: none;
  width: 100%;
  margin-top: 15px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.btn:active {
  transform: scale(0.97);
}

/* SUCCESS */
.success {
  margin-top: 10px;
  color: #4ade80;
  display: none;
}

/* SIMILAR */
.similar {
  margin-top: 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.card {
  background: #020617;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">

  <div id="product"></div>

  <div class="similar">
    <h3>Similar Products</h3>
    <div class="grid" id="similar-products"></div>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB48Z_i8k3gV3uHmNUFQjAH9bOvUlAGb44",
  authDomain: "danny-smart-power.firebaseapp.com",
  projectId: "danny-smart-power"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let selected = JSON.parse(localStorage.getItem("selectedProduct"));
let qty = 1;

/* CART SYSTEM */
function getCart(){
  return JSON.parse(localStorage.getItem("cart")) || [];
}

function saveCart(cart){
  localStorage.setItem("cart", JSON.stringify(cart));
}

function addToCart(){
  let cart = getCart();

  for(let i=0; i<qty; i++){
    cart.push(selected);
  }

  saveCart(cart);

  document.getElementById("success").style.display = "block";
}

/* QUANTITY */
function increase(){
  qty++;
  document.getElementById("qty").innerText = qty;
}

function decrease(){
  if(qty > 1){
    qty--;
    document.getElementById("qty").innerText = qty;
  }
}

/* LOAD PRODUCT */
function loadProduct(){
  let box = document.getElementById("product");

  box.innerHTML = `
    <img src="${selected.image}">
    <h2>${selected.name}</h2>
    <p class="price">₦${selected.price}</p>
    <p>High quality electrical product for your home and business needs.</p>

    <div class="qty-box">
      <button onclick="decrease()">-</button>
      <span id="qty">1</span>
      <button onclick="increase()">+</button>
    </div>

    <button class="btn" onclick="addToCart()">Add to Cart 🛒</button>
    <p class="success" id="success">✔ Added to cart</p>
  `;
}

/* SIMILAR */
function loadSimilar(){
  db.collection("products").get().then(res=>{
    let container = document.getElementById("similar-products");
    container.innerHTML = "";

    res.forEach(doc=>{
      let p = doc.data();

      if(p.category === selected.category && p.name !== selected.name){
        container.innerHTML += `
          <div class="card" onclick='goToProduct(${JSON.stringify(p)})'>
            <p>${p.name}</p>
            <p>₦${p.price}</p>
          </div>
        `;
      }
    });
  });
}

function goToProduct(product){
  localStorage.setItem("selectedProduct", JSON.stringify(product));
  location.reload();
}

/* INIT */
loadProduct();
loadSimilar();
</script>

</body>
</html>
