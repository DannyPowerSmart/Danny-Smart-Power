<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.container {
  max-width: 800px;
  margin: auto;
}

img {
  width: 100%;
  border-radius: 10px;
}

.price {
  color: #38bdf8;
  font-size: 20px;
  margin: 10px 0;
}

.btn {
  padding: 10px;
  width: 100%;
  background: #38bdf8;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 10px;
}

.similar {
  margin-top: 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

.card {
  background: #020617;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <div id="product"></div>

  <div class="similar">
    <h3>Similar Products</h3>
    <div class="grid" id="similar"></div>
  </div>
</div>

<script>
let product = JSON.parse(localStorage.getItem("selectedProduct"));

function displayProduct(){
  let box = document.getElementById("product");

  box.innerHTML = `
    <img src="${product.image}">
    <h2>${product.name}</h2>
    <p class="price">₦${product.price}</p>
    <p>${product.description || "High quality electrical product."}</p>

    <button class="btn" onclick="addToCart()">Add to Cart</button>
    <button class="btn" onclick="buyNow()">Buy on WhatsApp</button>
  `;
}

function addToCart(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}

function buyNow(){
  let phone = "2349036470778";
  let message = `Hello, I want to buy ${product.name} - ₦${product.price}`;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`);
}

function loadSimilar(){
  let all = JSON.parse(localStorage.getItem("allProducts")) || [];
  let box = document.getElementById("similar");

  let filtered = all.filter(p => p.category === product.category && p.name !== product.name);

  filtered.slice(0,3).forEach(p=>{
    box.innerHTML += `
      <div class="card" onclick='openProduct(${JSON.stringify(p)})'>
        <img src="${p.image}">
        <p>${p.name}</p>
      </div>
    `;
  });
}

function openProduct(p){
  localStorage.setItem("selectedProduct", JSON.stringify(p));
  location.reload();
}

displayProduct();
loadSimilar();
</script>

</body>
</html>
