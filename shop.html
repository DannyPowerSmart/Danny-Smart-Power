<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - Danny Smart Power</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: #0f172a;
  color: white;
}

/* HEADER */
header {
  background: #020617;
  padding: 15px 8%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

  .search-box {
  margin: 20px 8%;
}

.search-box input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 14px;
  background: #020617;
  color: white;
}

.search-box input::placeholder {
  color: #aaa;
}

/* MENU BUTTON */
.menu-btn {
  font-size: 22px;
  cursor: pointer;
}

/* SIDE MENU */
.side-menu {
  position: fixed;
  top: 0;
  left: -250px;
  width: 250px;
  height: 100%;
  background: #020617;
  padding: 20px;
  transition: 0.3s;
  z-index: 1000;
}

.side-menu a {
  display: block;
  color: white;
  text-decoration: none;
  margin: 15px 0;
}

.side-menu.active {
  left: 0;
}

/* LOGO */
.logo {
  color: #38bdf8;
  font-weight: 600;
}

/* NAV */
.nav {
  display: flex;
  gap: 20px;
}

.nav a {
  color: white;
  text-decoration: none;
}

/* CART */
.cart {
  position: relative;
}

.cart span {
  position: absolute;
  top: -8px;
  right: -10px;
  background: #38bdf8;
  color: black;
  font-size: 12px;
  padding: 2px 6px;
  border-radius: 50%;
}

/* BANNER */
.banner {
  margin: 20px 8%;
  height: 200px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  padding: 20px;
  background-size: cover;
  background-position: center;
}

.banner h2 {
  font-size: 24px;
}

/* CATEGORY */
.categories {
  margin: 20px 8%;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.cat-btn {
  padding: 8px 15px;
  background: #020617;
  border: 1px solid #38bdf8;
  color: white;
  border-radius: 20px;
  cursor: pointer;
}

.cat-btn:hover {
  background: #38bdf8;
  color: black;
}

/* PRODUCTS */
.container {
  padding: 0 8% 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}

@media(max-width: 900px){
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* CARD */
.card {
  background: #020617;
  border-radius: 12px;
  overflow: hidden;
  transition: 0.2s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

.price {
  color: #38bdf8;
  font-weight: bold;
}

.btn {
  margin-top: 8px;
  width: 100%;
  padding: 8px;
  border: none;
  background: #38bdf8;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- SIDE MENU -->
<div class="side-menu" id="menu">

  <!-- TOP BAR -->
  <div class="menu-header">
    <span class="back-btn" onclick="toggleMenu()">←</span>
    <h3>Danny Smart Power</h3>
  </div>

  <!-- LINKS -->
  <div class="menu-links">
    <a href="index.html">🏠 Home</a>
    <a href="shop.html">🛍 Shop</a>
    <a href="cart.html">🛒 My Cart</a>
    <a href="orders.html">📦 My Orders</a>
    <a href="#">⚡ Services</a>
    <a href="#">📞 Contact</a>
  </div>

  <!-- FOOTER -->
  <div class="menu-footer">
    <p>Powered by DSP ⚡</p>
  </div>

</div>
  
<!-- HEADER -->
<header>
  <span class="menu-btn" onclick="toggleMenu()">☰</span>

  <div class="logo">DSP</div>

  <div class="nav">
    <a href="index.html">Home</a>

    <div class="cart">
      <a href="cart.html">Cart 🛒</a>
      <span id="cart-count">0</span>
    </div>
  </div>
</header>

  <!-- SEARCH BAR -->
<div class="search-box">
  <input 
    type="text" 
    id="search" 
    placeholder="Search for electrical, solar, lighting..."
    onkeyup="searchProducts()"
  >
</div>

<!-- BANNER -->
<div class="banner" id="banner" onclick="openBannerProduct()">
  <h2 id="banner-text"></h2>
</div>

<!-- CATEGORY -->
<div class="categories">
  <button class="cat-btn" onclick="filterProducts('all')">All</button>
  <button class="cat-btn" onclick="filterProducts('solar')">Solar</button>
  <button class="cat-btn" onclick="filterProducts('lighting')">Lighting</button>
  <button class="cat-btn" onclick="filterProducts('electrical')">Electrical</button>
</div>

<!-- PRODUCTS -->
<div class="container">
  <div class="grid" id="product-list"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB48Z_i8k3gV3uHmNUFQjAH9bOvUlAGb44",
  authDomain: "danny-smart-power.firebaseapp.com",
  projectId: "danny-smart-power"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let allProducts = [];
  let currentBannerProduct = null;

/* MENU */
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}

/* CART */
function getCart(){
  return JSON.parse(localStorage.getItem("cart")) || [];
}

function saveCart(cart){
  localStorage.setItem("cart", JSON.stringify(cart));
}

function addToCart(product){
  let cart = getCart();
  cart.push(product);
  saveCart(cart);
  updateCartCount();
}

function updateCartCount(){
  document.getElementById("cart-count").innerText = getCart().length;
}

/* DISPLAY */
function displayProducts(list){
  let container = document.getElementById("product-list");
  container.innerHTML = "";

  list.forEach(p=>{
    container.innerHTML += `
      <div class="card" onclick='openProduct(${JSON.stringify(p)})'>
        <img src="${p.image}">
        <div class="card-content">
          <h4>${p.name}</h4>
          <p class="price">₦${p.price}</p>
          <button class="btn" onclick='event.stopPropagation(); addToCart(${JSON.stringify(p)})'>
            Add to Cart
          </button>
        </div>
      </div>
    `;
  });
}

/* FILTER */
function filterProducts(category){
  if(category === "all"){
    displayProducts(allProducts);
  } else {
    displayProducts(allProducts.filter(p => 
  (p.category || "").toLowerCase() === category.toLowerCase()
));
  }
  loadBanner();
}

/* BANNER */
let bannerInterval;

function loadBanner(){
  if(allProducts.length === 0) return;

  let banner = document.getElementById("banner");
  let text = document.getElementById("banner-text");

  let index = 0;

  // Clear old interval (important)
  if(bannerInterval){
    clearInterval(bannerInterval);
  }

  function changeBanner(){
    let random = allProducts[Math.floor(Math.random() * allProducts.length)];

    currentBannerProduct = random; // store current product

    banner.style.background = `url('${random.image}') center/cover`;
    text.innerText = random.name + " ⚡";
  }

  changeBanner();
  bannerInterval = setInterval(changeBanner, 4000);
}

/* LOAD FIRESTORE */
function loadProducts(){
  db.collection("products").get().then(snapshot=>{
    allProducts = [];
    snapshot.forEach(doc=>{
      allProducts.push(doc.data());
    });

    displayProducts(allProducts);
    loadBanner();
    localStorage.setItem("allProducts", JSON.stringify(allProducts));
  });
}

/* OPEN PRODUCT */
function openProduct(product){
  localStorage.setItem("selectedProduct", JSON.stringify(product));
  window.location.href = "product.html";
}
  function openBannerProduct(){
  if(!currentBannerProduct){
    alert("Banner not ready yet");
    return;
  }

  localStorage.setItem("selectedProduct", JSON.stringify(currentBannerProduct));
  window.location.href = "product.html";
}

/* INIT */
updateCartCount();
loadProducts();

  function searchProducts(){
  let value = document.getElementById("search").value.toLowerCase().trim();

  let filtered = allProducts.filter(p => {
    let name = (p.name || "").toLowerCase();
    let category = (p.category || "").toLowerCase();

    return name.includes(value) || category.includes(value);
  });

  // DEBUG (IMPORTANT)
  console.log("Search:", value, "Results:", filtered);

  displayProducts(filtered);
}
</script>

</body>
</html>
