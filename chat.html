<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danny Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#0f172a;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
header{
  background:#020617;
  color:white;
  padding:12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.back{
  font-size:20px;
  cursor:pointer;
}

.title{
  font-weight:600;
}

.menu-btn{
  font-size:20px;
  cursor:pointer;
}

/* DROPDOWN MENU */
.menu{
  position:absolute;
  top:60px;
  right:10px;
  background:#020617;
  border-radius:10px;
  display:none;
  overflow:hidden;
  z-index:10;
}

.menu a{
  display:block;
  padding:12px;
  color:white;
  text-decoration:none;
  border-bottom:1px solid #111;
}

.menu a:hover{
  background:#38bdf8;
  color:black;
}

/* CHAT */
.chat-box{
  flex:1;
  overflow-y:auto;
  padding:15px;
}

/* MESSAGE */
.msg{
  max-width:75%;
  padding:10px 12px;
  margin:8px 0;
  border-radius:12px;
  position:relative;
  font-size:14px;
}

.user{
  background:#38bdf8;
  margin-left:auto;
  color:black;
}

.admin{
  background:#1e293b;
  color:white;
}

/* TICKS */
.ticks{
  font-size:10px;
  position:absolute;
  bottom:4px;
  right:8px;
}

/* INPUT AREA */
.input-area{
  display:flex;
  align-items:center;
  padding:10px;
  background:#020617;
  position:sticky;
  bottom:0;
}

.input-area input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  outline:none;
}

.icon-btn{
  width:40px;
  height:40px;
  border-radius:50%;
  border:none;
  margin:0 5px;
  background:#38bdf8;
  cursor:pointer;
  font-size:18px;
}

/* FILE */
#file{
  display:none;
}

/* IMAGE MESSAGE */
.msg img{
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  <div class="back" onclick="goBack()">←</div>
  <div class="title">Danny</div>
  <div class="menu-btn" onclick="toggleMenu()">⋮</div>
</header>

<div class="menu" id="menu">
  <a href="#">Profile</a>
  <a href="#">Orders</a>
  <a href="#">Settings</a>
  <a href="#">Help</a>
</div>

<div class="chat-box" id="chat-box"></div>

<div class="input-area">
  <label for="file" class="icon-btn">+</label>
  <input type="file" id="file" accept="image/*">

  <input type="text" id="message" placeholder="Type message...">

  <button class="icon-btn" onclick="sendMessage()">➤</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB48Z_i8k3gV3uHmNUFQjAH9bOvUlAGb44",
  authDomain: "danny-smart-power.firebaseapp.com",
  projectId: "danny-smart-power",
  storageBucket: "danny-smart-power.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

/* CHAT ID (PRIVATE PER USER) */
let chatId = localStorage.getItem("chatId");

if(!chatId){
  chatId = Date.now().toString();
  localStorage.setItem("chatId", chatId);

  db.collection("chats").doc(chatId).set({
    createdAt:new Date()
  });

  // welcome message
  db.collection("chats").doc(chatId).collection("messages").add({
    text:"Hello 👋, this is Danny. We are here to assist you. Please tell us your issue.",
    sender:"admin",
    time:new Date(),
    seen:true
  });
}

/* LOAD MESSAGES REALTIME */
db.collection("chats")
.doc(chatId)
.collection("messages")
.orderBy("time")
.onSnapshot(snapshot=>{
  let box = document.getElementById("chat-box");
  box.innerHTML="";

  snapshot.forEach(doc=>{
    let msg = doc.data();

    let div = document.createElement("div");
    div.classList.add("msg", msg.sender);

    if(msg.image){
      div.innerHTML = `<img src="${msg.image}">`;
    } else {
      div.innerText = msg.text;
    }

    if(msg.sender==="user"){
      let tick = document.createElement("span");
      tick.className="ticks";
      tick.innerText = msg.seen ? "✔✔" : "✔";
      div.appendChild(tick);
    }

    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
});

/* SEND MESSAGE */
function sendMessage(){
  let text = document.getElementById("message").value.trim();
  let file = document.getElementById("file").files[0];

  if(!text && !file) return;

  if(file){
    let ref = storage.ref("chat-images/"+Date.now());

    ref.put(file).then(()=>{
      ref.getDownloadURL().then(url=>{
        saveMessage({image:url});
      });
    });
  }

  if(text){
    saveMessage({text:text});
  }

  document.getElementById("message").value="";
  document.getElementById("file").value="";
}

function saveMessage(data){
  db.collection("chats").doc(chatId).collection("messages").add({
    ...data,
    sender:"user",
    time:new Date(),
    seen:false
  });
}

/* MENU */
function toggleMenu(){
  let menu = document.getElementById("menu");
  menu.style.display = menu.style.display==="block"?"none":"block";
}

/* BACK */
function goBack(){
  window.history.back();
}
</script>

</body>
</html>
