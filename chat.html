<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat with Danny</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #0f172a;
  margin: 0;
  color: white;
}

/* HEADER */
header {
  background: #020617;
  padding: 15px;
  display: flex;
  align-items: center;
  gap: 10px;
}

header h2 {
  margin: 0;
}

/* CHAT AREA */
.chat-box {
  height: 70vh;
  overflow-y: auto;
  padding: 10px;
}

.message {
  padding: 10px;
  margin: 8px 0;
  border-radius: 10px;
  max-width: 70%;
}

.user {
  background: #38bdf8;
  margin-left: auto;
}

.bot {
  background: #1e293b;
}

/* INPUT */
.input-area {
  display: flex;
  padding: 10px;
  background: #020617;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  background: #38bdf8;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <a href="index.html">←</a>
  <h2>Chat with Danny 💬</h2>
</header>

<div class="chat-box" id="chatBox"></div>

<div class="input-area">
  <input type="text" id="messageInput" placeholder="Type your message...">
  <button onclick="sendMessage()">Send</button>
</div>

<script>
let chat = JSON.parse(localStorage.getItem("dannyChat")) || [];

function loadChat(){
  let box = document.getElementById("chatBox");
  box.innerHTML = "";

  chat.forEach(msg=>{
    let div = document.createElement("div");
    div.className = "message " + msg.type;
    div.innerText = msg.text;
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

function sendMessage(){
  let input = document.getElementById("messageInput");
  let text = input.value.trim();

  if(!text) return;

  chat.push({type:"user", text});
  
  // Simple auto reply
  setTimeout(()=>{
    chat.push({type:"bot", text:"Danny will reply you soon ⚡"});
    localStorage.setItem("dannyChat", JSON.stringify(chat));
    loadChat();
  }, 500);

  localStorage.setItem("dannyChat", JSON.stringify(chat));

  input.value = "";
  loadChat();
}

loadChat();
</script>

</body>
</html>
