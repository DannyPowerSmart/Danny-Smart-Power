<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danny Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#0f172a;
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
header{
  background:#020617;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title{
  font-weight:bold;
}

/* MENU */
.menu{
  position:absolute;
  right:10px;
  top:60px;
  background:#020617;
  border-radius:10px;
  display:none;
  padding:10px;
}

.menu a{
  display:block;
  padding:10px;
  color:white;
  text-decoration:none;
}

/* CHAT AREA */
.chat-box{
  flex:1;
  overflow-y:auto;
  padding:15px;
}

/* MESSAGE */
.msg{
  max-width:75%;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  position:relative;
  font-size:14px;
}

.user{
  background:#38bdf8;
  margin-left:auto;
  color:black;
}

.admin{
  background:#1e293b;
}

/* TICKS */
.ticks{
  font-size:10px;
  position:absolute;
  bottom:3px;
  right:8px;
}

/* INPUT */
.input-area{
  display:flex;
  padding:10px;
  background:#020617;
}

.input-area input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

.btn{
  margin-left:5px;
  background:#38bdf8;
  border:none;
  border-radius:50%;
  width:40px;
  height:40px;
  cursor:pointer;
}

/* FILE */
#file{
  display:none;
}
</style>
</head>

<body>

<header>
  <a href="index.html">←</a>
  <div class="title">Danny</div>
  <div onclick="toggleMenu()">⋮</div>
</header>

<div class="menu" id="menu">
  <a href="#">Profile</a>
  <a href="#">Orders</a>
  <a href="#">Settings</a>
  <a href="#">Help</a>
</div>

<div class="chat-box" id="chat-box"></div>

<div class="input-area">
  <label for="file" class="btn">+</label>
  <input type="file" id="file" accept="image/*">

  <input type="text" id="message" placeholder="Type message...">
  <button class="btn" onclick="sendMessage()">➤</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB48Z_i8k3gV3uHmNUFQjAH9bOvUlAGb44",
  authDomain: "danny-smart-power.firebaseapp.com",
  projectId: "danny-smart-power",
  storageBucket: "danny-smart-power.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

/* CHAT ID */
let chatId = sessionStorage.getItem("chatId");

if(!chatId){
  chatId = Date.now().toString();
  sessionStorage.setItem("chatId", chatId);

  db.collection("chats").doc(chatId).set({
    createdAt:new Date()
  });

  db.collection("chats").doc(chatId).collection("messages").add({
    text:"Hello 👋, this is Danny. We are here to assist you.",
    sender:"admin",
    time:new Date(),
    seen:true
  });
}

/* LOAD MESSAGES */
db.collection("chats")
.doc(chatId)
.collection("messages")
.orderBy("time")
.onSnapshot(snapshot=>{
  let box = document.getElementById("chat-box");
  box.innerHTML="";

  snapshot.forEach(doc=>{
    let msg = doc.data();

    let div = document.createElement("div");
    div.classList.add("msg");

    if(msg.sender==="user") div.classList.add("user");
    else div.classList.add("admin");

    if(msg.image){
      div.innerHTML = `<img src="${msg.image}" style="width:100%;border-radius:10px;">`;
    } else {
      div.innerText = msg.text;
    }

    // ✔✔ ticks
    if(msg.sender==="user"){
      let tick = document.createElement("span");
      tick.className = "ticks";
      tick.innerText = msg.seen ? "✔✔" : "✔";
      div.appendChild(tick);
    }

    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
});

/* SEND MESSAGE */
function sendMessage(){
  let text = document.getElementById("message").value;
  let file = document.getElementById("file").files[0];

  if(!text && !file) return;

  if(file){
    let ref = storage.ref("chat-images/"+Date.now());

    ref.put(file).then(()=>{
      ref.getDownloadURL().then(url=>{
        db.collection("chats").doc(chatId).collection("messages").add({
          image:url,
          sender:"user",
          time:new Date(),
          seen:false
        });
      });
    });
  }

  if(text){
    db.collection("chats").doc(chatId).collection("messages").add({
      text:text,
      sender:"user",
      time:new Date(),
      seen:false
    });
  }

  document.getElementById("message").value="";
  document.getElementById("file").value="";
}

/* MENU */
function toggleMenu(){
  let menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
