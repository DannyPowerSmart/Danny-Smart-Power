<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danny Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#0f172a;
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  background:#020617;
  padding:12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.header-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.header-title{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  font-weight:bold;
}

.menu-btn{
  cursor:pointer;
}

/* MENU */
.menu{
  position:fixed;
  right:-250px;
  top:0;
  width:250px;
  height:100%;
  background:#020617;
  padding:20px;
  transition:0.3s;
  z-index:10;
}

.menu a{
  display:block;
  margin-bottom:15px;
  text-decoration:none;
  color:white;
}

/* CHAT */
.chat-box{
  flex:1;
  overflow-y:auto;
  padding:15px;
  background:url("https://i.postimg.cc/8Cw8Jp7Y/bg-chat.png");
  background-size:cover;
}

/* MESSAGE */
.msg{
  max-width:75%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
}

.user{
  background:#38bdf8;
  margin-left:auto;
}

.admin{
  background:#1e293b;
}

/* INPUT */
.input-area{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  padding:10px;
  background:#020617;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
}

button{
  border:none;
  padding:10px;
  background:#38bdf8;
  border-radius:50%;
  margin-left:5px;
  cursor:pointer;
}

/* HIDDEN FILE */
#file{
  display:none;
}
</style>
</head>

<body>

<header>
  <div class="header-left">
    <a href="index.html">←</a>
  </div>

  <div class="header-title">Danny</div>

  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<!-- MENU -->
<div class="menu" id="menu">
  <a href="#">👤 Profile</a>
  <a href="#">📦 My Orders</a>
  <a href="#">⚙ Settings</a>
  <a href="#">❓ Help</a>
</div>

<!-- CHAT -->
<div class="chat-box" id="chat-box"></div>

<!-- INPUT -->
<div class="input-area">
  <label for="file">➕</label>
  <input type="file" id="file" accept="image/*">

  <input type="text" id="message" placeholder="Type message...">
  <button onclick="sendMessage()">➤</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB48Z_i8k3gV3uHmNUFQjAH9bOvUlAGb44",
  authDomain: "danny-smart-power.firebaseapp.com",
  projectId: "danny-smart-power",
  storageBucket: "danny-smart-power.appspot.com",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

/* UNIQUE CHAT */
let chatId = sessionStorage.getItem("chatId");

if(!chatId){
  chatId = Date.now().toString();
  sessionStorage.setItem("chatId", chatId);

  db.collection("chats").doc(chatId).set({
    createdAt:new Date()
  });

  // welcome message
  db.collection("chats").doc(chatId).collection("messages").add({
    text:"Hello 👋, this is Danny. We are here to assist you. Please tell us your issue.",
    sender:"admin",
    time:new Date()
  });
}

/* LOAD MESSAGES */
db.collection("chats")
.doc(chatId)
.collection("messages")
.orderBy("time")
.onSnapshot(snapshot=>{
  let box=document.getElementById("chat-box");
  box.innerHTML="";

  snapshot.forEach(doc=>{
    let msg=doc.data();

    let div=document.createElement("div");
    div.classList.add("msg");

    if(msg.sender==="user") div.classList.add("user");
    else div.classList.add("admin");

    if(msg.image){
      div.innerHTML = `<img src="${msg.image}" style="width:100%;border-radius:10px;">`;
    } else {
      div.innerText = msg.text;
    }

    box.appendChild(div);
  });

  box.scrollTop=box.scrollHeight;
});

/* SEND MESSAGE */
function sendMessage(){
  let input=document.getElementById("message");
  let file=document.getElementById("file").files[0];

  if(input.value.trim()==="" && !file) return;

  if(file){
    let ref=storage.ref("chat-images/"+Date.now());

    ref.put(file).then(()=>{
      ref.getDownloadURL().then(url=>{
        db.collection("chats").doc(chatId).collection("messages").add({
          image:url,
          sender:"user",
          time:new Date()
        });
      });
    });
  }

  if(input.value.trim()!==""){
    db.collection("chats").doc(chatId).collection("messages").add({
      text:input.value,
      sender:"user",
      time:new Date()
    });
  }

  input.value="";
  document.getElementById("file").value="";
}

/* MENU */
function toggleMenu(){
  let menu=document.getElementById("menu");
  menu.style.right = menu.style.right === "0px" ? "-250px" : "0px";
}
</script>

</body>
</html>
