<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Chat with Danny | Danny Smart Power</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{
  --bg:#07111f;
  --header:#020617;
  --blue:#38bdf8;
  --blue2:#0284c7;
  --green:#22c55e;
  --text:#f8fafc;
  --muted:#94a3b8;
  --border:rgba(148,163,184,.13);
  --userBubble:#087eb5;
  --dannyBubble:#172b40;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
}

body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
}

button,
textarea{
  font-family:inherit;
}

button{
  -webkit-tap-highlight-color:transparent;
}

/* ================================
   APP
================================ */

.chat-app{
  width:100%;
  height:100dvh;
  display:flex;
  flex-direction:column;
  position:relative;
  background:
    radial-gradient(
      circle at 50% -20%,
      rgba(56,189,248,.08),
      transparent 45%
    ),
    var(--bg);
}

/* ================================
   HEADER
================================ */

.chat-header{
  height:92px;
  min-height:92px;
  padding:0 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:rgba(2,6,23,.97);
  border-bottom:1px solid var(--border);
  z-index:20;
}

.back-button,
.menu-button{
  width:48px;
  height:48px;
  border:0;
  border-radius:16px;
  background:transparent;
  color:white;
  font-size:29px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.back-button:active,
.menu-button:active{
  background:#172033;
  transform:scale(.95);
}

.profile{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
}

.profile-avatar{
  width:56px;
  height:56px;
  flex-shrink:0;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(
    135deg,
    #38bdf8,
    #0284c7
  );
  font-size:28px;
  box-shadow:
    0 0 0 4px rgba(56,189,248,.08),
    0 0 24px rgba(56,189,248,.28);
}

.profile-info{
  min-width:0;
}

.profile-info h2{
  font-size:19px;
  font-weight:700;
  white-space:nowrap;
}

.status{
  color:var(--green);
  font-size:12px;
  font-weight:500;
}

/* ================================
   MESSAGES
================================ */

.messages-area{
  flex:1;
  min-height:0;
  overflow-y:auto;
  padding:20px 13px 24px;
  scroll-behavior:smooth;
  overscroll-behavior:contain;
  background:
    radial-gradient(
      circle at top left,
      rgba(56,189,248,.055),
      transparent 35%
    );
}

.messages-area::-webkit-scrollbar{
  width:4px;
}

.messages-area::-webkit-scrollbar-thumb{
  background:#26384c;
  border-radius:20px;
}

/* ================================
   WELCOME CARD
================================ */

.welcome-card{
  max-width:650px;
  margin:12px auto 25px;
  padding:30px 20px 26px;
  text-align:center;
  border:1px solid var(--border);
  border-radius:28px;
  background:
    linear-gradient(
      145deg,
      rgba(17,34,53,.95),
      rgba(8,20,35,.95)
    );
  box-shadow:
    0 18px 50px rgba(0,0,0,.15);
}

.welcome-icon{
  width:78px;
  height:78px;
  margin:0 auto 17px;
  border-radius:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:39px;
  background:
    linear-gradient(
      135deg,
      #38bdf8,
      #0284c7
    );
  box-shadow:
    0 10px 30px rgba(56,189,248,.2);
}

.welcome-card h1{
  font-size:22px;
  margin-bottom:10px;
}

.welcome-card p{
  color:var(--muted);
  line-height:1.8;
  font-size:14px;
}

.quick-actions{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:9px;
  margin-top:20px;
}

.quick-action{
  border:1px solid rgba(56,189,248,.16);
  border-radius:30px;
  padding:10px 14px;
  background:rgba(14,45,68,.7);
  color:#dbeafe;
  font-size:12px;
  cursor:pointer;
}

.quick-action:active{
  transform:scale(.96);
  background:#123b59;
}

/* ================================
   MESSAGES
================================ */

.message-row{
  display:flex;
  width:100%;
  margin:9px 0;
}

.message-row.user{
  justify-content:flex-end;
}

.message-row.danny{
  justify-content:flex-start;
}

.message{
  max-width:min(82%,530px);
  padding:12px 14px 8px;
  border-radius:19px;
  font-size:14px;
  line-height:1.55;
  word-break:break-word;
  overflow-wrap:anywhere;
  box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.message-row.user .message{
  background:linear-gradient(
    135deg,
    #0784bd,
    #056a9b
  );
  border-bottom-right-radius:5px;
}

.message-row.danny .message{
  background:var(--dannyBubble);
  border-bottom-left-radius:5px;
}

.message-image{
  display:block;
  width:min(300px,100%);
  max-height:370px;
  object-fit:cover;
  border-radius:14px;
  cursor:pointer;
  margin-bottom:5px;
}

.message-meta{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:5px;
  margin-top:4px;
  font-size:10px;
  color:rgba(255,255,255,.65);
}

.seen{
  color:#b9ecff;
  font-size:12px;
  letter-spacing:-2px;
}

/* ================================
   TYPING
================================ */

.typing-indicator{
  display:none;
  align-items:center;
  gap:8px;
  padding:5px 17px 8px;
  color:var(--muted);
  font-size:12px;
  background:var(--header);
}

.typing-indicator.active{
  display:flex;
}

.typing-dots{
  display:flex;
  gap:4px;
}

.typing-dots span{
  width:5px;
  height:5px;
  border-radius:50%;
  background:var(--blue);
  animation:typing 1.2s infinite;
}

.typing-dots span:nth-child(2){
  animation-delay:.15s;
}

.typing-dots span:nth-child(3){
  animation-delay:.3s;
}

@keyframes typing{
  0%,60%,100%{
    opacity:.3;
    transform:translateY(0);
  }

  30%{
    opacity:1;
    transform:translateY(-4px);
  }
}

/* ================================
   INPUT AREA
================================ */

.input-wrapper{
  flex-shrink:0;
  padding:
    9px
    10px
    calc(9px + env(safe-area-inset-bottom));
  background:rgba(2,6,23,.98);
  border-top:1px solid var(--border);
}

.input-area{
  width:100%;
  max-width:900px;
  margin:auto;
  display:flex;
  align-items:flex-end;
  gap:8px;
}

.attach-button,
.send-button{
  width:50px;
  height:50px;
  min-width:50px;
  border:none;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:.2s;
}

.attach-button{
  background:#17263a;
  color:white;
  font-size:29px;
}

.send-button{
  background:linear-gradient(
    135deg,
    #38bdf8,
    #0284c7
  );
  color:#00111c;
  font-size:23px;
  font-weight:bold;
}

.attach-button:active,
.send-button:active{
  transform:scale(.9);
}

.send-button:disabled{
  opacity:.4;
  cursor:not-allowed;
}

.message-input{
  flex:1;
  min-width:0;
  min-height:50px;
  max-height:130px;
  resize:none;
  outline:none;
  border:none;
  border-radius:26px;
  padding:14px 17px;
  background:#172338;
  color:white;
  font-size:14px;
  line-height:1.45;
  overflow-y:auto;
}

.message-input::placeholder{
  color:#718096;
}

/* ================================
   PREVIEW
================================ */

.preview-box{
  display:none;
  max-width:900px;
  margin:0 auto 9px;
  position:relative;
  padding-left:3px;
}

.preview-box.active{
  display:block;
}

.preview-box img{
  width:82px;
  height:82px;
  object-fit:cover;
  border-radius:15px;
  border:2px solid var(--blue);
}

.remove-preview{
  position:absolute;
  left:70px;
  top:-8px;
  width:25px;
  height:25px;
  border:0;
  border-radius:50%;
  background:#ef4444;
  color:white;
  font-size:17px;
  cursor:pointer;
}

/* ================================
   ATTACHMENT SHEET
================================ */

.attachment-overlay{
  position:fixed;
  inset:0;
  z-index:80;
  display:none;
  background:rgba(0,0,0,.58);
  align-items:flex-end;
}

.attachment-overlay.active{
  display:flex;
}

.attachment-sheet{
  width:100%;
  padding:18px 15px calc(18px + env(safe-area-inset-bottom));
  background:#0d1b2a;
  border-radius:25px 25px 0 0;
  border-top:1px solid rgba(255,255,255,.1);
  animation:sheetUp .25s ease;
}

@keyframes sheetUp{
  from{
    transform:translateY(100%);
  }

  to{
    transform:translateY(0);
  }
}

.sheet-handle{
  width:42px;
  height:4px;
  border-radius:10px;
  background:#475569;
  margin:0 auto 18px;
}

.attachment-options{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.attachment-option{
  min-height:88px;
  border:1px solid var(--border);
  border-radius:17px;
  background:#132337;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:7px;
  cursor:pointer;
}

.attachment-option:active{
  transform:scale(.96);
  background:#1a354d;
}

.attachment-option span:first-child{
  font-size:27px;
}

.attachment-option span:last-child{
  font-size:11px;
  color:#cbd5e1;
}

.cancel-attachment{
  width:100%;
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:15px;
  background:#1e293b;
  color:white;
  font-size:14px;
  cursor:pointer;
}

/* ================================
   SIDE MENU
================================ */

.menu-overlay{
  position:fixed;
  inset:0;
  z-index:40;
  display:none;
  background:rgba(0,0,0,.5);
}

.menu-overlay.active{
  display:block;
}

.side-menu{
  position:fixed;
  top:0;
  right:-340px;
  width:320px;
  max-width:88%;
  height:100dvh;
  z-index:50;
  padding:20px 15px;
  background:#020617;
  transition:right .3s ease;
  box-shadow:-15px 0 45px rgba(0,0,0,.45);
  overflow-y:auto;
}

.side-menu.active{
  right:0;
}

.menu-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:7px 4px 20px;
  border-bottom:1px solid var(--border);
}

.menu-top h3{
  font-size:18px;
}

.close-menu{
  border:none;
  background:transparent;
  color:white;
  font-size:29px;
  cursor:pointer;
}

.menu-user{
  padding:20px 4px;
  border-bottom:1px solid var(--border);
}

.menu-user strong{
  display:block;
  font-size:16px;
}

.menu-user span{
  display:block;
  margin-top:4px;
  color:var(--muted);
  font-size:12px;
  word-break:break-word;
}

.menu-links{
  padding-top:14px;
}

.menu-link{
  width:100%;
  display:flex;
  align-items:center;
  gap:13px;
  padding:15px 13px;
  margin-bottom:7px;
  border:none;
  border-radius:14px;
  background:transparent;
  color:white;
  text-decoration:none;
  text-align:left;
  font-size:14px;
  cursor:pointer;
}

.menu-link:active{
  background:#17253a;
}

.menu-icon{
  width:28px;
  text-align:center;
  font-size:19px;
}

.logout{
  color:#f87171;
}

/* ================================
   LOADING / ERROR
================================ */

.center-message{
  text-align:center;
  padding:60px 20px;
  color:var(--muted);
}

.error-box{
  max-width:520px;
  margin:35px auto;
  padding:28px 20px;
  text-align:center;
  border-radius:22px;
  background:#25151b;
  border:1px solid #7f1d1d;
}

.error-box h2{
  color:#fca5a5;
  margin-bottom:10px;
}

.error-box p{
  color:#fecaca;
  font-size:14px;
  line-height:1.6;
}

/* ================================
   MOBILE
================================ */

@media(max-width:600px){

  .chat-header{
    height:82px;
    min-height:82px;
    padding:0 8px;
  }

  .profile-avatar{
    width:49px;
    height:49px;
    font-size:24px;
  }

  .profile-info h2{
    font-size:17px;
  }

  .messages-area{
    padding:15px 9px 20px;
  }

  .message{
    max-width:86%;
    font-size:14px;
  }

  .welcome-card{
    margin:7px auto 22px;
    padding:26px 15px;
  }

  .welcome-card h1{
    font-size:20px;
  }

  .quick-action{
    font-size:11px;
  }

  .attachment-options{
    gap:7px;
  }

}

</style>
</head>

<body>

<script>

/* ==================================
   FIREBASE
================================== */

  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyB48Z_i8k3gV3uHmNUFQjAH9bOvUlAGb44",
  authDomain: "danny-smart-power.firebaseapp.com",
  databaseURL: "https://danny-smart-power-default-rtdb.firebaseio.com",
  projectId: "danny-smart-power",
  storageBucket: "danny-smart-power.firebasestorage.app",
  messagingSenderId: "649735645158",
  appId: "1:649735645158:web:cff518b89721a163679827",
  measurementId: "G-258YKLP5ZS"
};


firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();


/* ==================================
   ELEMENTS
================================== */

const messagesArea =
document.getElementById("messagesArea");

const loadingMessage =
document.getElementById("loadingMessage");

const messageInput =
document.getElementById("messageInput");

const sendButton =
document.getElementById("sendButton");

const attachButton =
document.getElementById("attachButton");

const galleryInput =
document.getElementById("galleryInput");

const cameraInput =
document.getElementById("cameraInput");

const previewBox =
document.getElementById("previewBox");

const previewImage =
document.getElementById("previewImage");

const removePreview =
document.getElementById("removePreview");

const typingIndicator =
document.getElementById("typingIndicator");

const onlineStatus =
document.getElementById("onlineStatus");

const menuButton =
document.getElementById("menuButton");

const closeMenu =
document.getElementById("closeMenu");

const sideMenu =
document.getElementById("sideMenu");

const menuOverlay =
document.getElementById("menuOverlay");

const logoutButton =
document.getElementById("logoutButton");

const backButton =
document.getElementById("backButton");

const menuUserName =
document.getElementById("menuUserName");

const menuUserEmail =
document.getElementById("menuUserEmail");

const attachmentOverlay =
document.getElementById("attachmentOverlay");

const cameraButton =
document.getElementById("cameraButton");

const galleryButton =
document.getElementById("galleryButton");

const fileButton =
document.getElementById("fileButton");

const cancelAttachment =
document.getElementById("cancelAttachment");


/* ==================================
   VARIABLES
================================== */

let currentUser = null;

let currentChatRef = null;

let messagesRef = null;

let selectedFile = null;

let unsubscribeMessages = null;

let unsubscribeTyping = null;

let typingTimer = null;

let isSending = false;


/* ==================================
   AUTH SESSION
================================== */

auth.onAuthStateChanged(async function(user){

if(!user){

onlineStatus.textContent =
"Not signed in";

sendButton.disabled = true;

loadingMessage.innerHTML = `

<div class="error-box">

<h2>Account not available</h2>

<p>
Your login session could not be restored.
Please return to the login page.
</p>

</div>

`;

return;

}


currentUser = user;

onlineStatus.textContent =
"Online";


const displayName =
user.displayName ||
user.email.split("@")[0];


menuUserName.textContent =
displayName;

menuUserEmail.textContent =
user.email;


/*
PRIVATE CHAT

chats/
  USER_UID/
    messages/
*/

currentChatRef =
db.collection("chats")
.doc(user.uid);

messagesRef =
currentChatRef.collection("messages");


try{

await createChatIfNeeded();

await createWelcomeMessageIfNeeded();

loadMessages();

listenToTyping();

sendButton.disabled = false;

}

catch(error){

console.error(error);

loadingMessage.innerHTML = `

<div class="error-box">

<h2>Chat could not load</h2>

<p>
${escapeHtml(error.message)}
</p>

</div>

`;

}

});


/* ==================================
   CREATE CHAT
================================== */

async function createChatIfNeeded(){

const snapshot =
await currentChatRef.get();


if(!snapshot.exists){

await currentChatRef.set({

userId:
currentUser.uid,

userEmail:
currentUser.email,

userName:
currentUser.displayName ||
currentUser.email.split("@")[0],

createdAt:
firebase.firestore.FieldValue.serverTimestamp(),

updatedAt:
firebase.firestore.FieldValue.serverTimestamp(),

lastMessage:"",

userTyping:false,

dannyTyping:false

});

}

}


/* ==================================
   WELCOME MESSAGE
================================== */

async function createWelcomeMessageIfNeeded(){

const query =
await messagesRef
.where("type","==","welcome")
.limit(1)
.get();


if(query.empty){

await messagesRef.add({

text:
"Hello 👋, this is Danny. We are here to assist you with your electrical, solar and power needs. Feel free to discuss anything with us. We will reply as soon as possible.",

sender:"danny",

senderId:"danny",

type:"welcome",

createdAt:
firebase.firestore.FieldValue.serverTimestamp(),

seen:true

});

}

}


/* ==================================
   LOAD MESSAGES
================================== */

function loadMessages(){

if(unsubscribeMessages){

unsubscribeMessages();

}


unsubscribeMessages =
messagesRef
.orderBy("createdAt","asc")
.onSnapshot(function(snapshot){

messagesArea.innerHTML = "";

addWelcomeCard();


snapshot.forEach(function(doc){

renderMessage(
doc.id,
doc.data()
);

});


markDannyMessagesAsSeen(snapshot);

scrollToBottom();

},
function(error){

console.error(
"Firestore message error:",
error
);

});

}


/* ==================================
   WELCOME CARD
================================== */

function addWelcomeCard(){

const welcome =
document.createElement("div");

welcome.className =
"welcome-card";

welcome.innerHTML = `

⚡
</div>

</h1>

<button class="quick-action" data-text="I need electrical service ⚡">

</button>

`;

welcome
.querySelectorAll(".quick-action")
.forEach(function(button){

button.addEventListener(
"click",
function(){

button.dataset.text;

autoResize();

updateSendButton();

messageInput.focus();

}

);

/* ==================================
   RENDER MESSAGE
================================== */

function renderMessage(id,message){

const row =
document.createElement("div");

const isUser =
message.senderId === currentUser.uid;

row.className =
"message-row " +
(isUser ? "user" : "danny");


const bubble =
document.createElement("div");

bubble.className =
"message";


if(message.image){

const image =
document.createElement("img");

image.className =
"message-image";

image.src =
message.image;

image.alt =
"Sent image";

image.addEventListener(
"click",
function(){

window.open(
message.image,
"_blank"
);

});

bubble.appendChild(image);

}


if(message.text){

const text =
document.createElement("div");

text.textContent =
message.text;

bubble.appendChild(text);

}


const meta =
document.createElement("div");

meta.className =
"message-meta";

meta.appendChild(
document.createTextNode(
formatTime(message.createdAt)
)
);


if(isUser){

const seen =
document.createElement("span");

seen.className =
"seen";

seen.textContent =
message.seen
? "✓✓"
: "✓";

meta.appendChild(seen);

}


bubble.appendChild(meta);

row.appendChild(bubble);

messagesArea.appendChild(row);

}


/* ==================================
   SEND MESSAGE
================================== */

async function sendMessage(){

if(!currentUser ||
isSending){

return;

}


const text =
messageInput.value.trim();


if(!text &&
!selectedFile){

return;

}


isSending = true;

sendButton.disabled = true;


try{

let imageUrl = null;


if(selectedFile){

const safeName =
selectedFile.name
.replace(/[^a-zA-Z0-9._-]/g,"_");


const fileName =
Date.now() +
"_" +
safeName;


const imageRef =
storage
.ref()
.child(
"chat-images/" +
currentUser.uid +
"/" +
fileName
);


await imageRef.put(
selectedFile
);


imageUrl =
await imageRef.getDownloadURL();

}


await messagesRef.add({

sender:"user",

senderId:
currentUser.uid,

userEmail:
currentUser.email,

text:
text || "",

image:
imageUrl || null,

seen:false,

createdAt:
firebase.firestore.FieldValue.serverTimestamp()

});


await currentChatRef.set({

updatedAt:
firebase.firestore.FieldValue.serverTimestamp(),

lastMessage:
text ||
"📷 Image",

userTyping:false

},{

merge:true

});


messageInput.value = "";

resetTextarea();

clearSelectedFile();

stopTyping();

scrollToBottom();

}

catch(error){

console.error(
"Send message error:",
error
);

alert(
"Message could not be sent. Please check your Firebase Storage Rules and try again."
);

}

finally{

isSending = false;

updateSendButton();

}

}


/* ==================================
   TYPING
================================== */

messageInput.addEventListener(
"input",
function(){

autoResize();

updateSendButton();

if(!currentUser){

return;

}


setTyping(true);

clearTimeout(
typingTimer
);


typingTimer =
setTimeout(
stopTyping,
1200
);

});


function setTyping(value){

if(!currentUser){

return;

}


currentChatRef.set({

userTyping:value

},{

merge:true

});

}


function stopTyping(){

clearTimeout(
typingTimer
);


if(currentUser){

currentChatRef.set({

userTyping:false

},{

merge:true

});

}

}


/* ==================================
   DANNY TYPING
================================== */

function listenToTyping(){

if(unsubscribeTyping){

unsubscribeTyping();

}


unsubscribeTyping =
currentChatRef.onSnapshot(
function(snapshot){

const data =
snapshot.data();


if(
data &&
data.dannyTyping === true
){

typingIndicator.classList.add(
"active"
);

}

else{

typingIndicator.classList.remove(
"active"
);

}

});

}


/* ==================================
   SEEN STATUS
================================== */

async function markDannyMessagesAsSeen(snapshot){

const batch =
db.batch();

let count = 0;


snapshot.forEach(function(doc){

const message =
doc.data();


if(

message.senderId === "danny" &&

message.seen === false

){

batch.update(
doc.ref,
{

seen:true,

seenAt:
firebase.firestore.FieldValue.serverTimestamp()

}

);

count++;

}

});


if(count > 0){

await batch.commit();

}

}


/* ==================================
   ATTACHMENT MENU
================================== */

attachButton.addEventListener(
"click",
function(){

attachmentOverlay.classList.add(
"active"
);

});


function closeAttachmentMenu(){

attachmentOverlay.classList.remove(
"active"
);

}


cancelAttachment.addEventListener(
"click",
closeAttachmentMenu
);


attachmentOverlay.addEventListener(
"click",
function(event){

if(
event.target ===
attachmentOverlay
){

closeAttachmentMenu();

}

});


cameraButton.addEventListener(
"click",
function(){

closeAttachmentMenu();

cameraInput.click();

});


galleryButton.addEventListener(
"click",
function(){

closeAttachmentMenu();

galleryInput.click();

});


fileButton.addEventListener(
"click",
function(){

closeAttachmentMenu();

galleryInput.removeAttribute(
"accept"
);

galleryInput.click();

setTimeout(function(){

galleryInput.setAttribute(
"accept",
"image/*"
);

},500);

});


galleryInput.addEventListener(
"change",
handleFile
);


cameraInput.addEventListener(
"change",
handleFile
);


function handleFile(event){

const file =
event.target.files[0];


if(!file){

return;

}


if(!file.type.startsWith("image/")){

alert(
"Please select an image file."
);

return;

}


if(file.size > 15 * 1024 * 1024){

alert(
"Image is too large. Maximum size is 15MB."
);

return;

}


selectedFile =
file;


const reader =
new FileReader();


reader.onload =
function(e){

previewImage.src =
e.target.result;

previewBox.classList.add(
"active"
);

updateSendButton();

};


reader.readAsDataURL(
file
);

}


removePreview.addEventListener(
"click",
clearSelectedFile
);


function clearSelectedFile(){

selectedFile =
null;

galleryInput.value =
"";

cameraInput.value =
"";

previewImage.src =
"";

previewBox.classList.remove(
"active"
);

updateSendButton();

}


/* ==================================
   INPUT
================================== */

function updateSendButton(){

const hasText =
messageInput.value.trim().length > 0;


sendButton.disabled =
!hasText &&
!selectedFile;

}


sendButton.addEventListener(
"click",
sendMessage
);


messageInput.addEventListener(
"keydown",
function(event){

if(
event.key === "Enter" &&
!event.shiftKey
){

event.preventDefault();

sendMessage();

}

});


function autoResize(){

messageInput.style.height =
"50px";


messageInput.style.height =
Math.min(
messageInput.scrollHeight,
130
) + "px";

}


function resetTextarea(){

messageInput.style.height =
"50px";

}


/* ==================================
   MENU
================================== */

menuButton.addEventListener(
"click",
function(){

sideMenu.classList.add(
"active"
);

menuOverlay.classList.add(
"active"
);

});


closeMenu.addEventListener(
"click",
closeSideMenu
);


menuOverlay.addEventListener(
"click",
closeSideMenu
);


function closeSideMenu(){

sideMenu.classList.remove(
"active"
);

menuOverlay.classList.remove(
"active"
);

}


/* ==================================
   LOGOUT
================================== */

logoutButton.addEventListener(
"click",
async function(){

const confirmed =
confirm(
"Are you sure you want to sign out?"
);


if(!confirmed){

return;

}


await auth.signOut();

window.location.href =
"login.html";

});


/* ==================================
   BACK
================================== */

backButton.addEventListener(
"click",
function(){

window.history.back();

});


/* ==================================
   HELPERS
================================== */

function scrollToBottom(){

setTimeout(
function(){

messagesArea.scrollTop =
messagesArea.scrollHeight;

},
100
);

}


function formatTime(timestamp){

if(
!timestamp ||
!timestamp.toDate
){

return "";

}


return timestamp
.toDate()
.toLocaleTimeString(
[],
{

hour:"2-digit",

minute:"2-digit"

}

);

}


function escapeHtml(text){

const div =
document.createElement(
"div"
);

div.textContent =
text;

return div.innerHTML;

}
