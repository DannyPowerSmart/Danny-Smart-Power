<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danny Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#0f172a;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
header{
  background:#020617;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title{font-weight:600;font-size:18px;}
.back{font-size:20px;cursor:pointer;}
.menu-btn{font-size:20px;cursor:pointer;}

/* MENU */
.menu{
  position:fixed;
  top:60px;
  right:10px;
  width:180px;
  background:#020617;
  border-radius:10px;
  display:none;
  box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

.menu a{
  display:block;
  padding:12px;
  color:white;
  text-decoration:none;
}
.menu a:hover{
  background:#38bdf8;
  color:black;
}

/* CHAT */
.chat-box{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
}

/* MESSAGE */
.msg{
  max-width:75%;
  padding:10px 12px;
  margin:6px 0;
  border-radius:12px;
  position:relative;
  font-size:14px;
}

.user{
  background:#38bdf8;
  align-self:flex-end;
  color:black;
}

.admin{
  background:#1e293b;
  align-self:flex-start;
  color:white;
}

/* IMAGE */
.msg img{
  width:100%;
  border-radius:10px;
}

/* TICKS */
.ticks{
  font-size:10px;
  position:absolute;
  bottom:3px;
  right:8px;
}

/* TYPING */
.typing{
  font-size:12px;
  color:#aaa;
  padding:0 15px;
}

/* INPUT */
.input-area{
  display:flex;
  align-items:center;
  padding:10px;
  background:#020617;
}

.input-area input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  outline:none;
}

.btn{
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  margin-left:5px;
  background:#38bdf8;
  cursor:pointer;
  font-size:16px;
}

#file{display:none;}
</style>
</head>

<body>

<header>
  <div class="back" onclick="history.back()">←</div>
  <div class="title">Danny</div>
  <div class="menu-btn" onclick="toggleMenu()">⋮</div>
</header>

<div class="menu" id="menu">
  <a href="#">Profile</a>
  <a href="#">Orders</a>
  <a href="#">Settings</a>
  <a href="#">Help Center</a>
</div>

<div class="chat-box" id="chat-box"></div>
<div class="typing" id="typing"></div>

<div class="input-area">
  <label for="file" class="btn">+</label>
  <input type="file" id="file" accept="image/*">

  <input type="text" id="message" placeholder="Type message..." oninput="sendTyping()">

  <button class="btn" onclick="sendMessage()">➤</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB48Z_i8k3gV3uHmNUFQjAH9bOvUlAGb44",
  authDomain: "danny-smart-power.firebaseapp.com",
  projectId: "danny-smart-power",
  storageBucket: "danny-smart-power.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

/* CREATE CHAT */
let chatId = Date.now().toString();
let chatRef = db.collection("chats").doc(chatId);

chatRef.set({
  createdAt:new Date(),
  typing:false
});

/* WELCOME MESSAGE */
chatRef.collection("messages").add({
  text:"Hello 👋, this is Danny. We are here to assist you. Please tell us your issue.",
  sender:"admin",
  time:new Date(),
  seen:true
});

/* LOAD MESSAGES */
chatRef.collection("messages")
.orderBy("time")
.onSnapshot(snapshot=>{
  let box=document.getElementById("chat-box");
  box.innerHTML="";

  snapshot.forEach(doc=>{
    let msg=doc.data();

    let div=document.createElement("div");
    div.classList.add("msg", msg.sender);

    if(msg.image){
      div.innerHTML=`<img src="${msg.image}">`;
    }else{
      div.innerText=msg.text;
    }

    if(msg.sender==="user"){
      let tick=document.createElement("span");
      tick.className="ticks";
      tick.innerText=msg.seen?"✔✔":"✔";
      div.appendChild(tick);
      doc.ref.update({seen:true});
    }

    box.appendChild(div);
  });

  box.scrollTop=box.scrollHeight;
});

/* SEND MESSAGE */
function sendMessage(){
  let text=document.getElementById("message").value.trim();
  let file=document.getElementById("file").files[0];

  if(!text && !file) return;

  if(file){
    let ref=storage.ref("chat/"+Date.now());
    ref.put(file).then(()=>{
      ref.getDownloadURL().then(url=>{
        chatRef.collection("messages").add({
          image:url,
          sender:"user",
          time:new Date(),
          seen:false
        });
      });
    });
  }

  if(text){
    chatRef.collection("messages").add({
      text:text,
      sender:"user",
      time:new Date(),
      seen:false
    });
  }

  document.getElementById("message").value="";
  document.getElementById("file").value="";
  chatRef.update({typing:false});
}

/* TYPING (REALTIME) */
function sendTyping(){
  chatRef.update({typing:true});
  setTimeout(()=>chatRef.update({typing:false}),1000);
}

/* LISTEN TYPING */
chatRef.onSnapshot(doc=>{
  let data=doc.data();
  document.getElementById("typing").innerText =
    data.typing ? "Danny is typing..." : "";
});

/* MENU */
function toggleMenu(){
  let m=document.getElementById("menu");
  m.style.display = m.style.display==="block"?"none":"block";
}
</script>

</body>
</html>
