<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat with Danny | Danny Smart Power</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{
  --bg:#0f172a;
  --header:#020617;
  --card:#111e30;
  --card2:#17253a;
  --border:rgba(148,163,184,.14);
  --blue:#38bdf8;
  --green:#22c55e;
  --text:#f8fafc;
  --muted:#94a3b8;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
}

body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* =========================
   APP
========================= */

.chat-app{
  width:100%;
  height:100dvh;
  display:flex;
  flex-direction:column;
  position:relative;
}

/* =========================
   HEADER
========================= */

.chat-header{
  height:106px;
  min-height:106px;
  background:var(--header);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  position:relative;
  z-index:20;
}

.back-button,
.menu-button{
  width:48px;
  height:48px;
  border:none;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:transparent;
  color:white;
  cursor:pointer;
  font-size:30px;
  transition:.2s;
}

.back-button:hover,
.menu-button:hover{
  background:#172033;
}

.profile{
  display:flex;
  align-items:center;
  gap:12px;
}

.profile-avatar{
  width:58px;
  height:58px;
  border-radius:50%;
  background:linear-gradient(135deg,#38bdf8,#0284c7);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  box-shadow:0 0 20px rgba(56,189,248,.25);
}

.profile-info h2{
  font-size:20px;
  line-height:1.2;
}

.status{
  color:var(--green);
  font-size:13px;
  margin-top:3px;
}

/* =========================
   MENU
========================= */

.menu-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  z-index:40;
}

.menu-overlay.active{
  display:block;
}

.side-menu{
  position:fixed;
  top:0;
  right:-330px;
  width:310px;
  max-width:88%;
  height:100dvh;
  background:#020617;
  z-index:50;
  transition:right .3s ease;
  box-shadow:-15px 0 40px rgba(0,0,0,.4);
  padding:22px 16px;
}

.side-menu.active{
  right:0;
}

.menu-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 4px 20px;
  border-bottom:1px solid var(--border);
}

.menu-top h3{
  font-size:18px;
}

.close-menu{
  border:none;
  background:transparent;
  color:white;
  font-size:27px;
  cursor:pointer;
}

.menu-user{
  padding:20px 4px;
  border-bottom:1px solid var(--border);
}

.menu-user strong{
  display:block;
  font-size:16px;
}

.menu-user span{
  display:block;
  color:var(--muted);
  font-size:12px;
  margin-top:4px;
  word-break:break-word;
}

.menu-links{
  padding-top:14px;
}

.menu-link{
  width:100%;
  display:flex;
  align-items:center;
  gap:13px;
  padding:15px 13px;
  margin-bottom:8px;
  border:none;
  border-radius:12px;
  background:transparent;
  color:white;
  text-align:left;
  font-family:inherit;
  font-size:14px;
  cursor:pointer;
  text-decoration:none;
}

.menu-link:hover{
  background:#17253a;
}

.menu-icon{
  width:28px;
  font-size:19px;
  text-align:center;
}

.logout{
  color:#f87171;
}

/* =========================
   CHAT AREA
========================= */

.messages-area{
  flex:1;
  min-height:0;
  overflow-y:auto;
  padding:22px 16px 20px;
  scroll-behavior:smooth;
  background:
    radial-gradient(circle at top left,rgba(56,189,248,.06),transparent 35%),
    var(--bg);
}

/* WELCOME */

.welcome-card{
  max-width:680px;
  margin:28px auto 24px;
  padding:28px 20px;
  text-align:center;
  border:1px solid var(--border);
  border-radius:24px;
  background:linear-gradient(145deg,#111e30,#0d1828);
}

.welcome-icon{
  width:70px;
  height:70px;
  border-radius:50%;
  margin:0 auto 15px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  background:#12324b;
}

.welcome-card h1{
  font-size:22px;
  margin-bottom:10px;
}

.welcome-card p{
  color:var(--muted);
  line-height:1.7;
  font-size:14px;
}

/* DATE */

.date-divider{
  text-align:center;
  color:#64748b;
  font-size:11px;
  margin:20px 0;
}

/* MESSAGE ROW */

.message-row{
  display:flex;
  margin:8px 0;
}

.message-row.user{
  justify-content:flex-end;
}

.message-row.danny{
  justify-content:flex-start;
}

/* MESSAGE */

.message{
  max-width:min(78%,520px);
  padding:11px 13px 8px;
  border-radius:17px;
  position:relative;
  word-wrap:break-word;
  overflow-wrap:anywhere;
  font-size:14px;
  line-height:1.5;
}

.message-row.danny .message{
  background:#1b293d;
  border-bottom-left-radius:5px;
}

.message-row.user .message{
  background:#0284c7;
  border-bottom-right-radius:5px;
}

.message-image{
  display:block;
  width:min(280px,100%);
  max-height:350px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
}

.message-meta{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:5px;
  margin-top:4px;
  font-size:10px;
  opacity:.75;
}

.seen{
  color:#bae6fd;
  font-size:12px;
}

/* TYPING */

.typing-indicator{
  display:none;
  align-items:center;
  gap:8px;
  color:var(--muted);
  font-size:12px;
  padding:8px 4px;
}

.typing-indicator.active{
  display:flex;
}

.typing-dots{
  display:flex;
  gap:3px;
}

.typing-dots span{
  width:5px;
  height:5px;
  border-radius:50%;
  background:var(--muted);
  animation:typing 1.2s infinite;
}

.typing-dots span:nth-child(2){
  animation-delay:.15s;
}

.typing-dots span:nth-child(3){
  animation-delay:.3s;
}

@keyframes typing{
  0%,60%,100%{
    opacity:.3;
    transform:translateY(0);
  }

  30%{
    opacity:1;
    transform:translateY(-3px);
  }
}

/* =========================
   INPUT AREA
========================= */

.input-wrapper{
  flex-shrink:0;
  background:var(--header);
  border-top:1px solid var(--border);
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
}

.input-area{
  width:100%;
  max-width:900px;
  margin:auto;
  display:flex;
  align-items:flex-end;
  gap:8px;
}

.attach-button,
.send-button{
  width:48px;
  height:48px;
  min-width:48px;
  border:none;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:25px;
}

.attach-button{
  background:#17253a;
  color:white;
}

.send-button{
  background:var(--blue);
  color:#00111c;
  font-size:22px;
  font-weight:bold;
}

.send-button:disabled{
  opacity:.45;
  cursor:not-allowed;
}

.message-input{
  flex:1;
  min-width:0;
  max-height:130px;
  min-height:48px;
  resize:none;
  border:none;
  outline:none;
  border-radius:25px;
  padding:14px 17px;
  background:#182337;
  color:white;
  font-family:inherit;
  font-size:14px;
  line-height:1.4;
}

.message-input::placeholder{
  color:#718096;
}

/* =========================
   ATTACHMENT PREVIEW
========================= */

.preview-box{
  display:none;
  max-width:900px;
  margin:0 auto 8px;
  position:relative;
}

.preview-box.active{
  display:block;
}

.preview-box img{
  width:85px;
  height:85px;
  object-fit:cover;
  border-radius:12px;
  border:2px solid var(--blue);
}

.remove-preview{
  position:absolute;
  left:68px;
  top:-8px;
  width:24px;
  height:24px;
  border:none;
  border-radius:50%;
  background:#ef4444;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

/* =========================
   LOADING / ERROR
========================= */

.center-message{
  text-align:center;
  padding:50px 20px;
  color:var(--muted);
}

.error-box{
  max-width:500px;
  margin:40px auto;
  padding:25px;
  text-align:center;
  background:#24151a;
  border:1px solid #7f1d1d;
  border-radius:18px;
}

.error-box h2{
  color:#fca5a5;
  margin-bottom:8px;
}

.error-box p{
  color:#fecaca;
  font-size:14px;
}

/* HIDDEN FILE INPUT */

.hidden-input{
  display:none;
}

/* MOBILE */

@media(max-width:600px){

  .chat-header{
    height:86px;
    min-height:86px;
    padding:0 10px;
  }

  .back-button,
  .menu-button{
    width:44px;
    height:44px;
  }

  .profile-avatar{
    width:48px;
    height:48px;
    font-size:24px;
  }

  .profile-info h2{
    font-size:17px;
  }

  .messages-area{
    padding:15px 10px;
  }

  .message{
    max-width:84%;
    font-size:14px;
  }

  .welcome-card{
    margin:18px auto;
    padding:25px 15px;
  }

  .welcome-card h1{
    font-size:20px;
  }

  .side-menu{
    width:300px;
  }

}

</style>
</head>

<body>

<div class="chat-app">

  <!-- HEADER -->

  <header class="chat-header">

    <button
      class="back-button"
      id="backButton"
      aria-label="Go back"
    >
      ←
    </button>

    <div class="profile">

      <div class="profile-avatar">
        ⚡
      </div>

      <div class="profile-info">

        <h2>Danny</h2>

        <div
          class="status"
          id="onlineStatus"
        >
          Connecting...
        </div>

      </div>

    </div>

    <button
      class="menu-button"
      id="menuButton"
      aria-label="Open menu"
    >
      ⋮
    </button>

  </header>


  <!-- MESSAGES -->

  <main
    class="messages-area"
    id="messagesArea"
  >

    <div
      class="center-message"
      id="loadingMessage"
    >
      Connecting to Danny Chat...
    </div>

  </main>


  <!-- TYPING -->

  <div
    class="typing-indicator"
    id="typingIndicator"
  >

    <div class="typing-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>

    Danny is typing...

  <div class="input-wrapper">

    <div
      class="preview-box"
      id="previewBox"
    >

      >

        id="removePreview"
      >
        ×
      </button>

    <div class="input-area">

        id="attachButton"

      <input

        id="cameraInput"

     FIREBASE
========================= -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>


<script>

/* ==================================
   FIREBASE CONFIGURATION
================================== */

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyB48Z_i8k3gV3uHmNUFQjAH9bOvUlAGb44",
  authDomain: "danny-smart-power.firebaseapp.com",
  databaseURL: "https://danny-smart-power-default-rtdb.firebaseio.com",
  projectId: "danny-smart-power",
  storageBucket: "danny-smart-power.firebasestorage.app",
  messagingSenderId: "649735645158",
  appId: "1:649735645158:web:cff518b89721a163679827",
  measurementId: "G-258YKLP5ZS"
};


firebase.initializeApp(firebaseConfig);


const auth =
firebase.auth();

const db =
firebase.firestore();

const storage =
firebase.storage();


/* ==================================
   ELEMENTS
================================== */

const messagesArea =
document.getElementById("messagesArea");

const loadingMessage =
document.getElementById("loadingMessage");

const messageInput =
document.getElementById("messageInput");

const sendButton =
document.getElementById("sendButton");

const attachButton =
document.getElementById("attachButton");

const galleryInput =
document.getElementById("galleryInput");

const cameraInput =
document.getElementById("cameraInput");

const previewBox =
document.getElementById("previewBox");

const previewImage =
document.getElementById("previewImage");

const removePreview =
document.getElementById("removePreview");

const typingIndicator =
document.getElementById("typingIndicator");

const onlineStatus =
document.getElementById("onlineStatus");

const menuButton =
document.getElementById("menuButton");

const closeMenu =
document.getElementById("closeMenu");

const sideMenu =
document.getElementById("sideMenu");

const menuOverlay =
document.getElementById("menuOverlay");

const logoutButton =
document.getElementById("logoutButton");

const backButton =
document.getElementById("backButton");

const menuUserName =
document.getElementById("menuUserName");

const menuUserEmail =
document.getElementById("menuUserEmail");


/* ==================================
   VARIABLES
================================== */

let currentUser = null;

let currentChatRef = null;

let messagesRef = null;

let selectedFile = null;

let unsubscribeMessages = null;

let unsubscribeTyping = null;

let typingTimer = null;

let isSending = false;


/* ==================================
   AUTH SESSION

   IMPORTANT:
   Firebase automatically restores
   the login session from login.html.

   We do NOT login again here.
================================== */

auth.onAuthStateChanged(async function(user){

  if(!user){

    onlineStatus.textContent =
    "Not signed in";

    loadingMessage.innerHTML = `

      <div class="error-box">

        <h2>Account not available</h2>

        <p>
          Your login session could not be restored.
          Please return to the login page.
        </p>

      </div>

    `;

    sendButton.disabled = true;

    return;

  }


  /* USER IS ALREADY LOGGED IN */

  currentUser = user;

  onlineStatus.textContent =
  "Online";


  /* LOAD PROFILE FROM FIREBASE AUTH */

  const displayName =
  user.displayName ||
  user.email.split("@")[0];


  menuUserName.textContent =
  displayName;


  menuUserEmail.textContent =
  user.email;


  /*
    PRIVATE CHAT

    Every user gets a different document:

    chats/
      USER_A_UID/
      USER_B_UID/
  */

  currentChatRef =
  db.collection("chats")
    .doc(user.uid);


  messagesRef =
  currentChatRef
    .collection("messages");


  try{

    await createChatIfNeeded();

    await createWelcomeMessageIfNeeded();

    loadMessages();

    listenToTyping();

    listenForNewMessages();

    sendButton.disabled = false;

  }

  catch(error){

    console.error(error);

    loadingMessage.innerHTML = `

      <div class="error-box">

        <h2>Chat could not load</h2>

        <p>
          ${escapeHtml(error.message)}
        </p>

      </div>

    `;

  }

});


/* ==================================
   CREATE PRIVATE CHAT
================================== */

async function createChatIfNeeded(){

  const chatSnapshot =
  await currentChatRef.get();


  if(!chatSnapshot.exists){

    await currentChatRef.set({

      userId:currentUser.uid,

      userEmail:currentUser.email,

      userName:
      currentUser.displayName ||
      currentUser.email.split("@")[0],

      createdAt:
      firebase.firestore.FieldValue.serverTimestamp(),

      updatedAt:
      firebase.firestore.FieldValue.serverTimestamp(),

      lastMessage:""

    });

  }

}


/* ==================================
   WELCOME MESSAGE

   Created only once for this user.
================================== */

async function createWelcomeMessageIfNeeded(){

  const welcomeQuery =
  await messagesRef
    .where("type","==","welcome")
    .limit(1)
    .get();


  if(welcomeQuery.empty){

    await messagesRef.add({

      text:
      "Hello 👋, this is Danny. We are here to assist you with your electrical, solar and power needs. Feel free to discuss anything with us. We will reply as soon as possible.",

      sender:"danny",

      senderId:"danny",

      type:"welcome",

      createdAt:
      firebase.firestore.FieldValue.serverTimestamp(),

      seen:true

    });

  }

}


/* ==================================
   LOAD MESSAGES REAL-TIME
================================== */

function loadMessages(){

  if(unsubscribeMessages){

    unsubscribeMessages();

  }


  unsubscribeMessages =
  messagesRef
  .orderBy("createdAt","asc")
  .onSnapshot(function(snapshot){

    const oldScrollHeight =
    messagesArea.scrollHeight;


    messagesArea.innerHTML = "";


    addWelcomeCard();


    let hasMessages =
    false;


    snapshot.forEach(function(doc){

      hasMessages = true;

      const message =
      doc.data();


      renderMessage(
        doc.id,
        message
      );

    });


    markDannyMessagesAsSeen(snapshot);


    if(!hasMessages){

      // The welcome message is created separately.

    }


    scrollToBottom();

  },function(error){

    console.error(
      "Message loading error:",
      error
    );

  });

}


/* ==================================
   WELCOME CARD
================================== */

function addWelcomeCard(){

  const welcome =
  document.createElement("div");

  welcome.className =
  "welcome-card";


  welcome.innerHTML = `

    <div class="welcome-icon">
      ⚡
    </div>

    <h1>
      Welcome to Danny Smart Power
    </h1>

    <p>
      Hello 👋, this is Danny. We are here to assist you with your electrical, solar and power needs. Feel free to discuss anything with us. We will reply as soon as possible.
    </p>

  `;


  messagesArea.appendChild(welcome);

}


/* ==================================
   RENDER MESSAGE
================================== */

function renderMessage(id,message){

  const row =
  document.createElement("div");


  const isUser =
  message.senderId === currentUser.uid;


  row.className =
  "message-row " +
  (isUser ? "user" : "danny");


  const bubble =
  document.createElement("div");


  bubble.className =
  "message";


  if(message.image){

    const image =
    document.createElement("img");


    image.className =
    "message-image";


    image.src =
    message.image;


    image.alt =
    "Sent image";


    image.addEventListener(
      "click",
      function(){

        window.open(
          message.image,
          "_blank"
        );

      }
    );


    bubble.appendChild(image);

  }


  if(message.text){

    const text =
    document.createElement("div");


    text.textContent =
    message.text;


    bubble.appendChild(text);

  }


  const meta =
  document.createElement("div");


  meta.className =
  "message-meta";


  meta.textContent =
  formatTime(
    message.createdAt
  );


  if(isUser){

    const seen =
    document.createElement("span");


    seen.className =
    "seen";


    seen.textContent =
    message.seen
    ? "✓✓"
    : "✓";


    meta.appendChild(seen);

  }


  bubble.appendChild(meta);

  row.appendChild(bubble);

  messagesArea.appendChild(row);

}


/* ==================================
   SEND MESSAGE
================================== */

async function sendMessage(){

  if(!currentUser){

    return;

  }


  if(isSending){

    return;

  }


  const text =
  messageInput.value.trim();


  if(!text && !selectedFile){

    return;

  }


  isSending = true;

  sendButton.disabled = true;


  try{

    let imageUrl =
    null;


    if(selectedFile){

      const fileName =
      Date.now() +
      "_" +
      currentUser.uid +
      "_" +
      selectedFile.name;


      const imageRef =
      storage
      .ref()
      .child(
        "chat-images/" +
        currentUser.uid +
        "/" +
        fileName
      );


      await imageRef.put(
        selectedFile
      );


      imageUrl =
      await imageRef.getDownloadURL();

    }


    const messageData = {

      sender:"user",

      senderId:
      currentUser.uid,

      userEmail:
      currentUser.email,

      text:
      text || "",

      image:
      imageUrl || null,

      seen:false,

      createdAt:
      firebase.firestore.FieldValue.serverTimestamp()

    };


    await messagesRef.add(
      messageData
    );


    await currentChatRef.update({

      updatedAt:
      firebase.firestore.FieldValue.serverTimestamp(),

      lastMessage:
      text ||
      "📷 Image"

    });


    messageInput.value =
    "";


    resetTextarea();

    clearSelectedFile();

    stopTyping();

    scrollToBottom();

  }

  catch(error){

    console.error(
      "Send error:",
      error
    );


    alert(
      "Message could not be sent. Please try again."
    );

  }


  isSending = false;

  sendButton.disabled = false;

}


/* ==================================
   TYPING INDICATOR
================================== */

messageInput.addEventListener(
  "input",
  function(){

    autoResize();

    updateSendButton();

    if(!currentUser){

      return;

    }


    setTyping(true);


    clearTimeout(
      typingTimer
    );


    typingTimer =
    setTimeout(
      stopTyping,
      1200
    );

  }
);


function setTyping(value){

  if(!currentUser){

    return;

  }


  currentChatRef.set({

    userTyping:value

  },{
    merge:true

  });

}


function stopTyping(){

  clearTimeout(
    typingTimer
  );


  if(currentUser){

    currentChatRef.set({

      userTyping:false

    },{
      merge:true

    });

  }

}


/* ==================================
   DANNY TYPING
================================== */

function listenToTyping(){

  if(unsubscribeTyping){

    unsubscribeTyping();

  }


  unsubscribeTyping =
  currentChatRef.onSnapshot(
    function(snapshot){

      const data =
      snapshot.data();


      if(
        data &&
        data.dannyTyping === true
      ){

        typingIndicator.classList.add(
          "active"
        );

      }

      else{

        typingIndicator.classList.remove(
          "active"
        );

      }

    }
  );

}


/* ==================================
   REAL-TIME SEEN STATUS
================================== */

function listenForNewMessages(){

  messagesRef
  .where("senderId","==","danny")
  .where("seen","==",false)
  .onSnapshot(function(snapshot){

    snapshot.forEach(function(doc){

      doc.ref.update({

        seen:true,

        seenAt:
        firebase.firestore.FieldValue.serverTimestamp()

      });

    });

  });

}


async function markDannyMessagesAsSeen(snapshot){

  const batch =
  db.batch();


  let count =
  0;


  snapshot.forEach(function(doc){

    const message =
    doc.data();


    if(

      message.senderId === "danny" &&

      message.seen === false

    ){

      batch.update(
        doc.ref,
        {
          seen:true,
          seenAt:
          firebase.firestore.FieldValue.serverTimestamp()
        }
      );


      count++;

    }

  });


  if(count > 0){

    await batch.commit();

  }

}


/* ==================================
   ATTACHMENT MENU
================================== */

attachButton.addEventListener(
  "click",
  function(){

    const choice =
    confirm(
      "Press OK to choose an image from your phone.\n\nPress Cancel to take a photo with your camera."
    );


    if(choice){

      galleryInput.click();

    }

    else{

      cameraInput.click();

    }

  }
);


galleryInput.addEventListener(
  "change",
  handleFile
);


cameraInput.addEventListener(
  "change",
  handleFile
);


function handleFile(event){

  const file =
  event.target.files[0];


  if(!file){

    return;

  }


  if(!file.type.startsWith("image/")){

    alert(
      "Please select an image."
    );

    return;

  }


  selectedFile =
  file;


  const reader =
  new FileReader();


  reader.onload =
  function(e){

    previewImage.src =
    e.target.result;


    previewBox.classList.add(
      "active"
    );

  };


  reader.readAsDataURL(
    file
  );


  updateSendButton();

}


removePreview.addEventListener(
  "click",
  clearSelectedFile
);


function clearSelectedFile(){

  selectedFile =
  null;


  galleryInput.value =
  "";


  cameraInput.value =
  "";


  previewImage.src =
  "";


  previewBox.classList.remove(
    "active"
  );


  updateSendButton();

}


/* ==================================
   INPUT
================================== */

function updateSendButton(){

  const hasText =
  messageInput.value.trim().length > 0;


  sendButton.disabled =
  !hasText &&
  !selectedFile;

}


sendButton.addEventListener(
  "click",
  sendMessage
);


messageInput.addEventListener(
  "keydown",
  function(event){

    if(
      event.key === "Enter" &&
      !event.shiftKey
    ){

      event.preventDefault();

      sendMessage();

    }

  }
);


function autoResize(){

  messageInput.style.height =
  "48px";


  messageInput.style.height =
  Math.min(
    messageInput.scrollHeight,
    130
  ) +
  "px";

}


function resetTextarea(){

  messageInput.style.height =
  "48px";

}


/* ==================================
   MENU
================================== */

menuButton.addEventListener(
  "click",
  function(){

    sideMenu.classList.add(
      "active"
    );

    menuOverlay.classList.add(
      "active"
    );

  }
);


closeMenu.addEventListener(
  "click",
  closeSideMenu
);


menuOverlay.addEventListener(
  "click",
  closeSideMenu
);


function closeSideMenu(){

  sideMenu.classList.remove(
    "active"
  );

  menuOverlay.classList.remove(
    "active"
  );

}


/* ==================================
   LOGOUT
================================== */

logoutButton.addEventListener(
  "click",
  async function(){

    const confirmLogout =
    confirm(
      "Are you sure you want to sign out?"
    );


    if(!confirmLogout){

      return;

    }


    await auth.signOut();


    window.location.href =
    "login.html";

  }
);


/* ==================================
   BACK
================================== */

backButton.addEventListener(
  "click",
  function(){

    window.history.back();

  }
);


/* ==================================
   HELPERS
================================== */

function scrollToBottom(){

  setTimeout(
    function(){

      messagesArea.scrollTop =
      messagesArea.scrollHeight;

    },
    80
  );

}


function formatTime(timestamp){

  if(
    !timestamp ||
    !timestamp.toDate
  ){

    return "";

  }


  return timestamp
  .toDate()
  .toLocaleTimeString(
    [],
    {
      hour:"2-digit",
      minute:"2-digit"
    }
  );

}


function escapeHtml(text){

  const div =
  document.createElement(
    "div"
  );


  div.textContent =
  text;


  return div.innerHTML;

}
