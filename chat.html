<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danny Chat Support</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#0f172a;
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
header{
  background:#020617;
  padding:15px;
  display:flex;
  align-items:center;
  gap:10px;
}

header a{
  color:#38bdf8;
  text-decoration:none;
}

/* CHAT AREA */
.chat-box{
  flex:1;
  padding:15px;
  overflow-y:auto;
}

/* MESSAGE */
.msg{
  max-width:70%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
}

.user{
  background:#38bdf8;
  margin-left:auto;
}

.admin{
  background:#1e293b;
}

/* INPUT */
.input-area{
  display:flex;
  padding:10px;
  background:#020617;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-right:10px;
}

button{
  padding:10px;
  border:none;
  background:#38bdf8;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <a href="index.html">←</a>
  <h3>Danny Support</h3>
</header>

<div class="chat-box" id="chat-box"></div>

<div class="input-area">
  <input type="text" id="message" placeholder="Type message...">
  <button onclick="sendMessage()">Send</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB48Z_i8k3gV3uHmNUFQjAH9bOvUlAGb44",
  authDomain: "danny-smart-power.firebaseapp.com",
  projectId: "danny-smart-power",
  storageBucket: "danny-smart-power.firebasestorage.app",
  messagingSenderId: "649735645158",
  appId: "1:649735645158:web:cff518b89721a163679827"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* 🔥 IMPORTANT */
let chatId = localStorage.getItem("chatId");

if(!chatId){
  chatId = Date.now().toString();
  localStorage.setItem("chatId", chatId);

  db.collection("chats").doc(chatId).set({
    userName: "Customer"
  });
}

/* LOAD MESSAGES REALTIME */
db.collection("chats")
.doc(chatId)
.collection("messages")
.orderBy("time")
.onSnapshot(snapshot=>{
  
  let box = document.getElementById("chat-box");
  box.innerHTML = "";

  snapshot.forEach(doc=>{
    let msg = doc.data();

    let div = document.createElement("div");
    div.classList.add("msg");

    if(msg.sender === "user"){
      div.classList.add("user");
    }else{
      div.classList.add("admin");
    }

    div.innerText = msg.text;
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
});

/* SEND MESSAGE */
function sendMessage(){
  let input = document.getElementById("message");
  let text = input.value.trim();

  if(!text) return;

  db.collection("chats")
  .doc(chatId)
  .collection("messages")
  .add({
    text: text,
    sender: "user",
    time: new Date()
  });

  input.value = "";
}
</script>

</body>
</html>
