<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile | Danny Smart Power</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#07111f;
  --card:#0d1b2e;
  --card2:#12243a;
  --border:rgba(148,163,184,.16);
  --blue:#38bdf8;
  --blue2:#0284c7;
  --green:#22c55e;
  --red:#ef4444;
  --white:#f8fafc;
  --muted:#94a3b8;
}

html,
body{
  min-height:100%;
}

body{
  font-family:'Poppins',sans-serif;
  background:
    radial-gradient(circle at top left,rgba(56,189,248,.12),transparent 35%),
    var(--bg);
  color:var(--white);
}

/* HEADER */

.header{
  height:76px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  background:rgba(2,6,23,.92);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:10;
}

.back-btn{
  width:44px;
  height:44px;
  border:none;
  border-radius:50%;
  background:transparent;
  color:white;
  font-size:27px;
  cursor:pointer;
}

.back-btn:hover{
  background:var(--card2);
}

.header-title{
  font-size:18px;
  font-weight:700;
}

.header-spacer{
  width:44px;
}

/* MAIN */

.container{
  width:100%;
  max-width:650px;
  margin:0 auto;
  padding:25px 16px 50px;
}

/* PROFILE TOP */

.profile-top{
  text-align:center;
  margin-bottom:25px;
}

.avatar-wrapper{
  position:relative;
  width:125px;
  height:125px;
  margin:0 auto 15px;
}

.avatar{
  width:125px;
  height:125px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid var(--blue);
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:48px;
  font-weight:700;
  box-shadow:0 0 30px rgba(56,189,248,.2);
}

.camera-btn{
  position:absolute;
  right:0;
  bottom:2px;
  width:40px;
  height:40px;
  border-radius:50%;
  border:3px solid var(--bg);
  background:var(--blue);
  color:#00111c;
  font-size:19px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.profile-top h1{
  font-size:23px;
  margin-bottom:5px;
}

.profile-top p{
  color:var(--muted);
  font-size:13px;
  word-break:break-word;
}

/* CARD */

.card{
  background:linear-gradient(145deg,var(--card),#091525);
  border:1px solid var(--border);
  border-radius:22px;
  padding:20px;
  margin-bottom:16px;
  box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.card-title{
  font-size:16px;
  font-weight:700;
  margin-bottom:18px;
}

/* FORM */

.form-group{
  margin-bottom:16px;
}

.form-group label{
  display:block;
  color:var(--muted);
  font-size:12px;
  margin-bottom:7px;
}

.form-group input,
.form-group select,
.form-group textarea{
  width:100%;
  border:1px solid var(--border);
  outline:none;
  border-radius:13px;
  background:#081525;
  color:white;
  font-family:inherit;
  font-size:14px;
  padding:13px 14px;
  transition:.2s;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(56,189,248,.1);
}

.form-group textarea{
  min-height:100px;
  resize:vertical;
}

.form-group select option{
  background:#081525;
}

/* EMAIL */

.email-box{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px;
  border-radius:13px;
  background:#081525;
  border:1px solid var(--border);
}

.email-icon{
  font-size:22px;
}

.email-info{
  min-width:0;
}

.email-label{
  display:block;
  color:var(--muted);
  font-size:11px;
}

.email-value{
  display:block;
  font-size:13px;
  word-break:break-word;
}

/* SAVE */

.save-btn{
  width:100%;
  min-height:52px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  color:#00111c;
  font-family:inherit;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
  transition:.2s;
}

.save-btn:hover{
  transform:translateY(-1px);
}

.save-btn:disabled{
  opacity:.65;
  cursor:not-allowed;
  transform:none;
}

/* STATUS */

.status-box{
  display:none;
  text-align:center;
  padding:12px;
  margin-bottom:16px;
  border-radius:12px;
  font-size:13px;
}

.status-box.show{
  display:block;
}

.status-box.success{
  background:rgba(34,197,94,.12);
  color:#86efac;
  border:1px solid rgba(34,197,94,.25);
}

.status-box.error{
  background:rgba(239,68,68,.12);
  color:#fca5a5;
  border:1px solid rgba(239,68,68,.25);
}

.status-box.loading{
  background:rgba(56,189,248,.1);
  color:#7dd3fc;
  border:1px solid rgba(56,189,248,.2);
}

/* ACCOUNT */

.account-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:15px;
  padding:13px 0;
  border-bottom:1px solid var(--border);
}

.account-row:last-child{
  border-bottom:none;
}

.account-label{
  color:var(--muted);
  font-size:13px;
}

.account-value{
  font-size:13px;
  text-align:right;
  word-break:break-word;
}

/* HIDDEN */

.hidden{
  display:none;
}

/* LOADING */

.page-loading{
  position:fixed;
  inset:0;
  background:var(--bg);
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:14px;
}

.loader{
  width:38px;
  height:38px;
  border:4px solid rgba(255,255,255,.15);
  border-top-color:var(--blue);
  border-radius:50%;
  animation:spin .8s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

/* MOBILE */

@media(max-width:500px){

  .container{
    padding:20px 12px 40px;
  }

  .card{
    padding:17px;
    border-radius:18px;
  }

  .profile-top h1{
    font-size:21px;
  }

}

</style>
</head>

<body>

<!-- PAGE LOADING -->

<div class="page-loading" id="pageLoading">

  <div class="loader"></div>

  <p>Loading your profile...</p>

</div>


<!-- HEADER -->

<header class="header">

  <button
    class="back-btn"
    id="backBtn"
  >
    ←
  </button>

  <div class="header-title">
    My Profile
  </div>

  <div class="header-spacer"></div>

</header>


<main class="container">

  <!-- PROFILE TOP -->

  <section class="profile-top">

    <div class="avatar-wrapper">

      <div
        class="avatar"
        id="avatar"
      >
        ⚡
      </div>

      <button
        class="camera-btn"
        id="cameraBtn"
        type="button"
      >
        📷
      </button>

    </div>

    <h1 id="profileHeading">
      My Profile
    </h1>

    <p id="profileEmail">
      Loading...
    </p>

  </section>


  <!-- STATUS -->

  <div
    class="status-box"
    id="statusBox"
  ></div>


  <!-- PROFILE INFORMATION -->

  <section class="card">

    <h2 class="card-title">
      Personal Information
    </h2>


    <div class="form-group">

      <label for="nameInput">
        Full Name
      </label>

      <input
        id="nameInput"
        type="text"
        placeholder="Enter your full name"
        autocomplete="name"
      >

    </div>


    <div class="form-group">

      <label for="phoneInput">
        Phone Number
      </label>

      <input
        id="phoneInput"
        type="tel"
        placeholder="Enter your phone number"
        autocomplete="tel"
      >

    </div>


    <div class="form-group">

      <label for="ageInput">
        Age
      </label>

      <input
        id="ageInput"
        type="number"
        min="1"
        max="120"
        placeholder="Enter your age"
      >

    </div>


    <div class="form-group">

      <label for="genderInput">
        Gender
      </label>

      <select id="genderInput">

        <option value="">
          Select gender
        </option>

        <option value="Male">
          Male
        </option>

        <option value="Female">
          Female
        </option>

        <option value="Prefer not to say">
          Prefer not to say
        </option>

      </select>

    </div>


    <div class="form-group">

      <label for="bioInput">
        About You
      </label>

      <textarea
        id="bioInput"
        placeholder="Tell us a little about yourself..."
      ></textarea>

    </div>


    <button
      class="save-btn"
      id="saveBtn"
      type="button"
    >
      Save Profile
    </button>

  </section>


  <!-- ACCOUNT INFORMATION -->

  <section class="card">

    <h2 class="card-title">
      Account Information
    </h2>


    <div class="account-row">

      <span class="account-label">
        Email
      </span>

      <span
        class="account-value"
        id="accountEmail"
      >
        Loading...
      </span>

    </div>


    <div class="account-row">

      <span class="account-label">
        Account ID
      </span>

      <span
        class="account-value"
        id="accountId"
      >
        Loading...
      </span>

    </div>

  </section>

</main>


<!-- FILE INPUT -->

<input
  type="file"
  id="imageInput"
  class="hidden"
  accept="image/*"
>


<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>


<script>

/* =====================================
   FIREBASE CONFIG
===================================== */

const firebaseConfig = {

  apiKey:
  "AIzaSyB48Z_i8k3gV3uHmNUFQjAH9bOvALgb44",

  authDomain:
  "danny-smart-power.firebaseapp.com",

  databaseURL:
  "https://danny-smart-power-default-rtdb.firebaseio.com",

  projectId:
  "danny-smart-power",

  storageBucket:
  "danny-smart-power.firebasestorage.app",

  messagingSenderId:
  "649735645158",

  appId:
  "1:649735645158:web:cff518b89721a163679827",

  measurementId:
  "G-258YKLP5ZS"

};


firebase.initializeApp(firebaseConfig);


const auth =
firebase.auth();

const db =
firebase.firestore();

const storage =
firebase.storage();


/* =====================================
   ELEMENTS
===================================== */

const pageLoading =
document.getElementById("pageLoading");

const backBtn =
document.getElementById("backBtn");

const avatar =
document.getElementById("avatar");

const cameraBtn =
document.getElementById("cameraBtn");

const imageInput =
document.getElementById("imageInput");

const profileHeading =
document.getElementById("profileHeading");

const profileEmail =
document.getElementById("profileEmail");

const accountEmail =
document.getElementById("accountEmail");

const accountId =
document.getElementById("accountId");

const nameInput =
document.getElementById("nameInput");

const phoneInput =
document.getElementById("phoneInput");

const ageInput =
document.getElementById("ageInput");

const genderInput =
document.getElementById("genderInput");

const bioInput =
document.getElementById("bioInput");

const saveBtn =
document.getElementById("saveBtn");

const statusBox =
document.getElementById("statusBox");


/* =====================================
   VARIABLES
===================================== */

let currentUser = null;

let selectedImage = null;


/* =====================================
   AUTH
===================================== */

auth.onAuthStateChanged(async function(user){

  if(!user){

    window.location.href =
    "login.html";

    return;

  }


  currentUser =
  user;


  profileEmail.textContent =
  user.email;


  accountEmail.textContent =
  user.email;


  accountId.textContent =
  user.uid.substring(0,12) + "...";


  await loadProfile();


  pageLoading.style.display =
  "none";

});


/* =====================================
   LOAD PROFILE
===================================== */

async function loadProfile(){

  try{

    const userRef =
    db.collection("users")
      .doc(currentUser.uid);


    const snapshot =
    await userRef.get();


    if(snapshot.exists){

      const data =
      snapshot.data();


      nameInput.value =
      data.name || "";


      phoneInput.value =
      data.phone || "";


      ageInput.value =
      data.age || "";


      genderInput.value =
      data.gender || "";


      bioInput.value =
      data.bio || "";


      if(data.photoURL){

        avatar.innerHTML = "";

        avatar.style.background =
        "none";

        const image =
        document.createElement("img");

        image.src =
        data.photoURL;

        image.alt =
        "Profile picture";

        image.style.width =
        "100%";

        image.style.height =
        "100%";

        image.style.objectFit =
        "cover";

        image.style.borderRadius =
        "50%";

        avatar.appendChild(image);

      }

      if(data.name){

        profileHeading.textContent =
        data.name;

      }

    }

  }

  catch(error){

    console.error(
      "PROFILE LOAD ERROR:",
      error
    );


    showStatus(
      "Could not load profile: " +
      error.message,
      "error"
    );

  }

}


/* =====================================
   IMAGE SELECT
===================================== */

cameraBtn.addEventListener(
  "click",
  function(){

    imageInput.click();

  }
);


imageInput.addEventListener(
  "change",
  function(event){

    const file =
    event.target.files[0];


    if(!file){

      return;

    }


    if(!file.type.startsWith("image/")){

      showStatus(
        "Please select an image file.",
        "error"
      );

      return;

    }


    selectedImage =
    file;


    const reader =
    new FileReader();


    reader.onload =
    function(e){

      avatar.innerHTML = "";

      avatar.style.background =
      "none";


      const image =
      document.createElement("img");


      image.src =
      e.target.result;


      image.style.width =
      "100%";

      image.style.height =
      "100%";

      image.style.objectFit =
      "cover";

      image.style.borderRadius =
      "50%";


      avatar.appendChild(image);

    };


    reader.readAsDataURL(file);

  }
);


/* =====================================
   SAVE PROFILE
===================================== */

saveBtn.addEventListener(
  "click",
  saveProfile
);


async function saveProfile(){

  if(!currentUser){

    showStatus(
      "You are not logged in.",
      "error"
    );

    return;

  }


  const name =
  nameInput.value.trim();


  const phone =
  phoneInput.value.trim();


  const age =
  ageInput.value.trim();


  const gender =
  genderInput.value;


  const bio =
  bioInput.value.trim();


  if(!name){

    showStatus(
      "Please enter your name.",
      "error"
    );

    nameInput.focus();

    return;

  }


  saveBtn.disabled =
  true;


  saveBtn.textContent =
  "Saving...";


  showStatus(
    "Saving your profile...",
    "loading"
  );


  try{

    let photoURL =
    null;


    /*
      UPLOAD PROFILE IMAGE
    */

    if(selectedImage){

      const safeName =
      selectedImage.name
        .replace(
          /[^a-zA-Z0-9._-]/g,
          "_"
        );


      const imageRef =
      storage
        .ref()
        .child(
          "profile-images/" +
          currentUser.uid +
          "/" +
          Date.now() +
          "_" +
          safeName
        );


      await imageRef.put(
        selectedImage
      );


      photoURL =
      await imageRef.getDownloadURL();

    }


    /*
      SAVE PROFILE TO:

      users/
        CURRENT_USER_UID
    */

    const profileData = {

      uid:
      currentUser.uid,

      name:
      name,

      email:
      currentUser.email,

      phone:
      phone,

      age:
      age,

      gender:
      gender,

      bio:
      bio,

      updatedAt:
      firebase.firestore.FieldValue.serverTimestamp()

    };


    if(photoURL){

      profileData.photoURL =
      photoURL;

    }


    await db
      .collection("users")
      .doc(currentUser.uid)
      .set(
        profileData,
        {
          merge:true
        }
      );


    /*
      UPDATE FIREBASE AUTH DISPLAY NAME
    */

    if(
      currentUser.displayName !== name
    ){

      await currentUser.updateProfile({

        displayName:
        name

      });

    }


    profileHeading.textContent =
    name;


    selectedImage =
    null;


    imageInput.value =
    "";


    saveBtn.textContent =
    "Saved ✓";


    showStatus(
      "Your profile was saved successfully.",
      "success"
    );


    setTimeout(
      function(){

        saveBtn.textContent =
        "Save Profile";

      },
      2000
    );

  }

  catch(error){

    console.error(
      "FULL PROFILE SAVE ERROR:",
      error
    );


    showStatus(
      "Save failed: " +
      error.message,
      "error"
    );


    saveBtn.textContent =
    "Try Again";

  }


  saveBtn.disabled =
  false;

}


/* =====================================
   STATUS MESSAGE
===================================== */

function showStatus(
  message,
  type
){

  statusBox.textContent =
  message;


  statusBox.className =
  "status-box show " +
  type;

}


/* =====================================
   BACK
===================================== */

backBtn.addEventListener(
  "click",
  function(){

    window.history.back();

  }
);

</script>

</body>
   </html>
