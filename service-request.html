<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Service - Danny Smart Power</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  background: #020617;
  padding: 15px 8%;
  display: flex;
  justify-content: space-between;
}

a { color: #38bdf8; text-decoration: none; }

.container {
  padding: 20px 8%;
}

.banner {
  height: 200px;
  border-radius: 12px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  padding: 20px;
  background: #020617;
}

.banner h2 {
  position: absolute;
  z-index: 2;
  color: white;
  font-size: 20px;
}

.banner::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
}
form {
  background: #020617;
  padding: 20px;
  border-radius: 12px;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 8px;
  border: none;
  background: #0f172a;
  color: white;
}

.btn {
  margin-top: 15px;
  padding: 12px;
  background: #38bdf8;
  border: none;
  width: 100%;
  cursor: pointer;
  border-radius: 8px;
  font-weight: bold;
}

.btn:disabled {
  background: gray;
  cursor: not-allowed;
}

/* IMAGE */
.preview {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
  display: none;
}
</style>
</head>

<body>

<header>
  <h2>⚡ Request Electrical Service</h2>
  <a href="index.html">← Back</a>
</header>

<div class="container">

<form onsubmit="sendServiceRequest(event)">
  <h3>Tell us what you need</h3>

  <input type="text" id="name" placeholder="Full Name" required>
  <input type="tel" id="phone" placeholder="Phone Number" required>

  <select id="service" required>
    <option value="">Select Service</option>
    <option>Electrical Installation</option>
    <option>Electrical Repair</option>
    <option>Solar Installation</option>
    <option>Lighting Setup</option>
  </select>

  <input type="text" id="location" placeholder="Detecting your location..." required>

  <textarea id="details" rows="4" placeholder="Describe your problem..." required></textarea>

  <!-- IMAGE -->
  <input type="file" id="image" accept="image/*">
  <img id="preview" class="preview">

  <small style="color:#aaa;">
    After submitting, image will be sent automatically 📸
  </small>

  <button type="submit" class="btn" id="submitBtn">Request Service</button>
</form>

  <div class="banner" id="banner">
  <video id="banner-video" autoplay muted loop style="width:100%; height:100%; object-fit:cover; display:none;"></video>
  <h2 id="banner-text"></h2>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR KEY",
  authDomain: "YOUR DOMAIN",
  projectId: "YOUR ID",
  storageBucket: "YOUR BUCKET"
};

firebase.initializeApp(firebaseConfig);
const storage = firebase.storage();

  /* SERVICE BANNER DATA */
let banners = [
  {
    type: "image",
    src: "https://i.postimg.cc/pXkzCM9g/1664297728469.jpg",
    text: "Professional Lighting Installation ⚡"
  },
  {
    type: "image",
    src: "https://i.postimg.cc/QxhhsH83/1665223017400.jpg",
    text: "Reliable Electrical Repair 🔧"
  },
  {
    type: "video",
    src: "https://www.w3schools.com/html/mov_bbb.mp4",
    text: "Real Work in Progress 👷‍♂️"
  }
];

/* LOCATION */
function getLocation(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      let lat = pos.coords.latitude;
      let lon = pos.coords.longitude;

      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
      .then(res=>res.json())
      .then(data=>{
        document.getElementById("location").value = data.display_name;
      })
      .catch(()=>{
        document.getElementById("location").placeholder = "Enter location manually";
      });
    }, ()=>{
      document.getElementById("location").placeholder = "Allow location or type manually";
    });
  }
}
window.onload = getLocation;
  window.onload = function(){
  getLocation();
  loadServiceBanner();
};

/* IMAGE PREVIEW */
let selectedImage = null;

document.getElementById("image").addEventListener("change", function(){
  selectedImage = this.files[0];

  if(selectedImage){
    let reader = new FileReader();
    reader.onload = e=>{
      let preview = document.getElementById("preview");
      preview.src = e.target.result;
      preview.style.display = "block";
    };
    reader.readAsDataURL(selectedImage);
  }
});

/* MAIN FUNCTION */
function sendServiceRequest(e){
  e.preventDefault();

  let btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerText = "Sending...";

  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let service = document.getElementById("service").value;
  let location = document.getElementById("location").value.trim();
  let details = document.getElementById("details").value.trim();

  if(!name || !phone || !service || !location || !details){
    alert("Fill all fields");
    btn.disabled = false;
    btn.innerText = "Request Service";
    return;
  }

  if(selectedImage){
    let fileName = Date.now() + "_" + selectedImage.name;
    let ref = storage.ref("fault-images/" + fileName);

    ref.put(selectedImage)
    .then(()=> ref.getDownloadURL())
    .then(url=>{
      sendWhatsApp(name, phone, service, location, details, url);
    })
    .catch(err=>{
      console.error(err);
      alert("Image upload failed");
      resetBtn();
    });

  } else {
    sendWhatsApp(name, phone, service, location, details, null);
  }
}

/* SEND TO WHATSAPP */
function sendWhatsApp(name, phone, service, location, details, imageUrl){

  let message = `⚡ *Service Request*%0A%0A`;
  message += `Name: ${name}%0A`;
  message += `Phone: ${phone}%0A`;
  message += `Service: ${service}%0A`;
  message += `Location: ${location}%0A`;
  message += `Details: ${details}%0A`;

  if(imageUrl){
    message += `%0A📸 Image: ${imageUrl}`;
  }

  let admin = "2349036470778";
  window.open(`https://wa.me/${admin}?text=${message}`);

  alert("Request sent successfully!");

  document.querySelector("form").reset();
  document.getElementById("preview").style.display = "none";

  resetBtn();
}

/* RESET BUTTON */
function resetBtn(){
  let btn = document.getElementById("submitBtn");
  btn.disabled = false;
  btn.innerText = "Request Service";
}

  let bannerIndex = 0;

function loadServiceBanner(){
  let banner = document.getElementById("banner");
  let video = document.getElementById("banner-video");
  let text = document.getElementById("banner-text");

  function changeBanner(){
    let item = banners[bannerIndex];

    if(item.type === "image"){
      video.style.display = "none";
      banner.style.background = `url('${item.src}') center/cover`;
    }

    if(item.type === "video"){
      banner.style.background = "none";
      video.style.display = "block";
      video.src = item.src;
      video.play();
    }

    text.innerText = item.text;

    bannerIndex++;
    if(bannerIndex >= banners.length){
      bannerIndex = 0;
    }
  }

  changeBanner();
  setInterval(changeBanner, 5000);
}
</script>

</body>
</html>
