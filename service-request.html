<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Service - Danny Smart Power</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
}

/* HEADER */
header {
  background: #020617;
  padding: 15px 8%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-weight: bold;
  font-size: 18px;
  color: #38bdf8;
}

.back {
  color: #38bdf8;
  text-decoration: none;
}

/* CONTAINER */
.container {
  padding: 20px 8%;
}

/* SEARCH */
.search-box {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #020617;
  color: white;
  margin-bottom: 20px;
}

/* BANNER */
.banner {
  height: 200px;
  border-radius: 12px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  padding: 20px;
  cursor: pointer;
}

.banner h2 {
  position: absolute;
  z-index: 2;
}

.banner::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
}

/* BUTTON */
.card-btn {
  background: #020617;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  cursor: pointer;
  text-align: center;
  transition: 0.3s;
}

.card-btn:hover {
  background: #38bdf8;
  color: black;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.grid img {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>
  <div class="logo">Danny Smart Power ⚡</div>
  <a href="index.html" class="back">← Back</a>
</header>

<div class="container">

  <!-- SEARCH -->
  <input type="text" id="search" class="search-box" placeholder="Search service..." onkeyup="searchService()">

  <!-- BANNER -->
  <div class="banner" id="banner" onclick="openBanner()">
    <h2 id="banner-text"></h2>
  </div>

  <!-- CHAT SUPPORT -->
  <div class="card-btn" onclick="contactSupport()">
     💬 Chat with Support  
  </div>

  <!-- PROJECTS -->
  <div class="card-btn" onclick="showProjects()">
    🛠 Our Completed Projects
  </div>

  <!-- PROJECT IMAGES -->
  <div id="projects" class="grid" style="display:none;">
    <img src="https://i.postimg.cc/pXkzCM9g/1664297728469.jpg">
    <img src="https://i.postimg.cc/QxhhsH83/1665223017400.jpg">
  </div>

</div>

<script>

/* SEARCH */
function searchService(){
  let input = document.getElementById("search").value.toLowerCase();

  let cards = document.querySelectorAll(".card-btn");

  cards.forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(input) ? "block" : "none";
  });
}

/* 💬 CONTACT SUPPORT (UPDATED TO CHAT SYSTEM) */
function contactSupport(){

  // Create a unique chat ID
  let chatId = Date.now().toString();

  // Save chatId so chat.html can use it
  sessionStorage.setItem("chatId", chatId);

  // Create chat in Firebase
  db.collection("chats").doc(chatId).set({
    userName: "Customer",
    createdAt: new Date()
  });

  // Send first message directly to Firebase
  db.collection("chats")
    .doc(chatId)
    .collection("messages")
    .add({
      text: "Hello, I need electrical service support.",
      sender: "user",
      time: new Date()
    });

  // Go to chat page
  window.location.href = "chat.html";
}

  // Save first message for chat page
  localStorage.setItem("chatMessage", "Hello, I need electrical service support.");

  // Go to chat page
  window.location.href = "chat.html";
}

/* SHOW PROJECTS */
function showProjects(){
  let box = document.getElementById("projects");
  box.style.display = box.style.display === "none" ? "grid" : "none";
}

/* BANNER */
let banners = [
  {
    img: "https://i.postimg.cc/pXkzCM9g/1664297728469.jpg",
    text: "Lighting Installation ⚡"
  },
  {
    img: "https://i.postimg.cc/QxhhsH83/1665223017400.jpg",
    text: "Electrical Repair 🔧"
  }
];

let index = 0;

function loadBanner(){
  let banner = document.getElementById("banner");
  let text = document.getElementById("banner-text");

  banner.style.background = `url('${banners[index].img}') center/cover`;
  text.innerText = banners[index].text;

  index++;
  if(index >= banners.length) index = 0;
}

setInterval(loadBanner, 4000);
loadBanner();

/* CLICK BANNER */
function openBanner(){
  window.open(banners[index - 1].img, "_blank");
}

</script>

</body>
</html>
