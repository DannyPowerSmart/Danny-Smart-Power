<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Service - DSP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  background:#0f172a;
  color:white;
  margin:0;
}

/* HEADER */
header{
  background:#020617;
  padding:15px;
  display:flex;
  align-items:center;
  gap:10px;
}

header a{
  color:#38bdf8;
  text-decoration:none;
  font-size:18px;
}

/* CONTAINER */
.container{
  padding:20px;
}

/* SEARCH */
.search{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#020617;
  color:white;
  margin-bottom:20px;
}

/* BANNER */
.banner{
  height:180px;
  border-radius:12px;
  margin-bottom:20px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
}

.banner img,
.banner video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* BUTTON BOX */
.card{
  background:#020617;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  background:#38bdf8;
  color:black;
}
</style>
</head>

<body>

<header>
  <a href="index.html">←</a>
  <h3>Request Service</h3>
</header>

<div class="container">

  <!-- SEARCH -->
  <input type="text" class="search" placeholder="Search...">

  <!-- RANDOM BANNER -->
  <div class="banner" id="banner" onclick="openBanner()">
    <img id="banner-img">
    <video id="banner-video" muted loop style="display:none;"></video>
  </div>

  <!-- TALK TO DANNY -->
  <div class="card" onclick="talkToDanny()">
    Talk to Danny
  </div>

  <!-- SAMPLE WORK -->
  <div class="card" onclick="openWork()">
    Sample of Work That's Done
  </div>

</div>

<script>
/* BANNER DATA */
let banners = [
  {
    type:"image",
    src:"https://i.postimg.cc/pXkzCM9g/1664297728469.jpg",
    link:"https://wa.me/2349036470778"
  },
  {
    type:"image",
    src:"https://i.postimg.cc/QxhhsH83/1665223017400.jpg",
    link:"https://wa.me/2349036470778"
  },
  {
    type:"video",
    src:"https://www.w3schools.com/html/mov_bbb.mp4",
    link:"https://wa.me/2349036470778"
  }
];

let currentBanner = {};

/* LOAD RANDOM BANNER */
function loadBanner(){
  let random = Math.floor(Math.random()*banners.length);
  currentBanner = banners[random];

  let img = document.getElementById("banner-img");
  let video = document.getElementById("banner-video");

  if(currentBanner.type === "image"){
    img.style.display="block";
    video.style.display="none";
    img.src = currentBanner.src;
  }else{
    img.style.display="none";
    video.style.display="block";
    video.src = currentBanner.src;
    video.play();
  }
}

/* CLICK BANNER */
function openBanner(){
  if(currentBanner.link){
    window.open(currentBanner.link,"_blank");
  }
}

/* TALK TO DANNY */
function talkToDanny(){
  let message = "Hello Danny, I need electrical service";
  window.open("https://wa.me/2349036470778?text="+encodeURIComponent(message));
}

/* SAMPLE WORK */
function openWork(){
  window.location.href = "work.html"; // create later
}

/* INIT */
loadBanner();
</script>

</body>
</html>
