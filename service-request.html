<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Service - DSP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { font-family: Poppins; background:#0f172a; color:white; margin:0; }

header {
  background:#020617;
  padding:15px 8%;
  display:flex;
  justify-content:space-between;
}

.container { padding:20px 8%; }

.banner {
  height:200px;
  border-radius:12px;
  overflow:hidden;
  position:relative;
  margin-bottom:20px;
  cursor:pointer;
}

.banner video, .banner img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.banner h2 {
  position:absolute;
  bottom:10px;
  left:15px;
  z-index:2;
}

/* FORM */
form {
  background:#020617;
  padding:20px;
  border-radius:12px;
}

input, select, textarea {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  background:#0f172a;
  color:white;
}

.btn {
  margin-top:15px;
  padding:12px;
  background:#38bdf8;
  border:none;
  width:100%;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

/* PRICE BOX */
.price-box {
  background:#020617;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  <h2>⚡ Request Service</h2>
  <a href="index.html">← Back</a>
</header>

<div class="container">

<!-- 🔥 BANNER -->
<div class="banner" id="banner" onclick="useBannerService()">
  <video id="bannerVideo" autoplay muted loop></video>
  <img id="bannerImage" style="display:none;">
  <h2 id="bannerText"></h2>
</div>

<!-- FORM -->
<form onsubmit="submitRequest(event)">

<input type="text" id="name" placeholder="Full Name" required>
<input type="tel" id="phone" placeholder="Phone Number" required>

<select id="service" onchange="updatePrice()" required>
  <option value="">Select Service</option>
  <option value="installation">Electrical Installation</option>
  <option value="repair">Electrical Repair</option>
  <option value="solar">Solar Installation</option>
  <option value="lighting">Lighting Setup</option>
</select>

<input type="text" id="location" placeholder="Detecting location..." required>

<input type="date" id="date" required>
<input type="time" id="time" required>

<textarea id="details" placeholder="Describe your issue..." required></textarea>

<input type="file" id="image">

<div class="price-box">
  <p>Estimated Price: <span id="price">₦0</span></p>
  <p>Technician: <span id="tech">Auto Assign</span></p>
</div>

<button class="btn">Submit Request</button>

</form>

</div>

<script>
// 🔥 SERVICES DATA
let services = {
  installation: { price: 15000, tech: "John ⚡" },
  repair: { price: 8000, tech: "Mike 🔧" },
  solar: { price: 50000, tech: "Solar Expert ☀️" },
  lighting: { price: 12000, tech: "Lighting Pro 💡" }
};

// 🔥 UPDATE PRICE
function updatePrice(){
  let service = document.getElementById("service").value;
  if(services[service]){
    document.getElementById("price").innerText = "₦" + services[service].price;
    document.getElementById("tech").innerText = services[service].tech;
  }
}

// 📍 LOCATION
navigator.geolocation.getCurrentPosition(pos=>{
  let lat = pos.coords.latitude;
  let lon = pos.coords.longitude;

  fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("location").value = data.display_name;
  });
});

// 🎬 BANNER DATA (YOU CAN REPLACE WITH FIREBASE URL)
let banners = [
  {type:"video", src:"https://www.w3schools.com/html/mov_bbb.mp4", text:"Live Installation Work"},
  {type:"image", src:"https://i.postimg.cc/pXkzCM9g/1664297728469.jpg", text:"Lighting Setup"}
];

let i = 0;

function loadBanner(){
  let item = banners[i];

  let video = document.getElementById("bannerVideo");
  let img = document.getElementById("bannerImage");

  if(item.type === "video"){
    video.style.display = "block";
    img.style.display = "none";
    video.src = item.src;
  } else {
    video.style.display = "none";
    img.style.display = "block";
    img.src = item.src;
  }

  document.getElementById("bannerText").innerText = item.text;

  i = (i + 1) % banners.length;
}

setInterval(loadBanner, 4000);
loadBanner();

// 👉 CLICK BANNER = AUTO SELECT SERVICE
function useBannerService(){
  document.getElementById("service").value = "installation";
  updatePrice();
  alert("Service selected from banner ⚡");
}

// 📤 SUBMIT
function submitRequest(e){
  e.preventDefault();

  let name = nameInput("name");
  let phone = nameInput("phone");
  let service = nameInput("service");
  let location = nameInput("location");
  let date = nameInput("date");
  let time = nameInput("time");
  let details = nameInput("details");

  let price = services[service]?.price || 0;
  let tech = services[service]?.tech || "Auto";

  let msg = `⚡ Service Request\n\n`;
  msg += `Name: ${name}\nPhone: ${phone}\n`;
  msg += `Service: ${service}\nTechnician: ${tech}\n`;
  msg += `Date: ${date} ${time}\n`;
  msg += `Location: ${location}\n`;
  msg += `Details: ${details}\n`;
  msg += `Estimated Price: ₦${price}`;

  window.open("https://wa.me/2349036470778?text=" + encodeURIComponent(msg));
}

// helper
function nameInput(id){
  return document.getElementById(id).value.trim();
}
</script>

</body>
</html>
