<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Service - Danny Smart Power</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #0f172a;
  color: white;
}

/* HEADER */
header {
  background: #020617;
  padding: 15px 6%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header a {
  color: #38bdf8;
  text-decoration: none;
}

/* CONTAINER */
.container {
  padding: 20px 6%;
  max-width: 600px;
  margin: auto;
}

/* BANNER */
.banner {
  height: 180px;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  margin-bottom: 20px;
  cursor: pointer;
}

.banner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.banner h2 {
  position: absolute;
  bottom: 10px;
  left: 15px;
  font-size: 18px;
  background: rgba(0,0,0,0.5);
  padding: 5px 10px;
  border-radius: 6px;
}

/* FORM */
form {
  background: #020617;
  padding: 20px;
  border-radius: 14px;
}

form h3 {
  margin-bottom: 10px;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 8px;
  border: none;
  background: #0f172a;
  color: white;
  font-size: 14px;
}

textarea {
  resize: none;
}

/* INFO BOX */
.info-box {
  background: #0f172a;
  padding: 12px;
  margin-top: 15px;
  border-radius: 10px;
  font-size: 14px;
}

/* BUTTON */
.btn {
  margin-top: 15px;
  padding: 14px;
  background: #38bdf8;
  border: none;
  width: 100%;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  font-size: 15px;
}

.btn:active {
  transform: scale(0.98);
}
</style>
</head>

<body>

<header>
  <h2>⚡ Request Service</h2>
  <a href="index.html">← Back</a>
</header>

<div class="container">

<!-- 🔥 BANNER -->
<div class="banner" id="banner" onclick="selectServiceFromBanner()">
  <img id="banner-img">
  <h2 id="banner-text"></h2>
</div>

<!-- 📋 FORM -->
<form onsubmit="submitRequest(event)">

<h3>Book an Electrical Service</h3>

<input type="text" id="name" placeholder="Full Name" required>
<input type="tel" id="phone" placeholder="Phone Number" required>

<select id="service" onchange="updateInfo()" required>
  <option value="">Select Service</option>
  <option value="installation">Electrical Installation</option>
  <option value="repair">Electrical Repair</option>
  <option value="solar">Solar Installation</option>
  <option value="lighting">Lighting Setup</option>
</select>

<input type="text" id="location" placeholder="Detecting your location..." required>

<input type="date" id="date" required>
<input type="time" id="time" required>

<textarea id="details" rows="4" placeholder="Describe your issue..." required></textarea>

<input type="file" id="image">

<!-- 💰 INFO -->
<div class="info-box">
  <p>💰 Estimated Price: <span id="price">₦0</span></p>
  <p>👨‍🔧 Technician: <span id="tech">Auto Assign</span></p>
</div>

<button class="btn">Request Service</button>

</form>

</div>

<script>

/* SERVICE DATA */
const services = {
  installation: { price: 15000, tech: "John ⚡" },
  repair: { price: 8000, tech: "Mike 🔧" },
  solar: { price: 50000, tech: "Solar Expert ☀️" },
  lighting: { price: 12000, tech: "Lighting Pro 💡" }
};

/* UPDATE PRICE */
function updateInfo(){
  let s = document.getElementById("service").value;

  if(services[s]){
    document.getElementById("price").innerText = "₦" + services[s].price;
    document.getElementById("tech").innerText = services[s].tech;
  }
}

/* GPS LOCATION */
navigator.geolocation.getCurrentPosition(pos=>{
  fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json`)
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("location").value = data.display_name;
  })
  .catch(()=>{
    document.getElementById("location").placeholder = "Enter manually";
  });
});

/* BANNER */
const banners = [
  {
    img: "https://i.postimg.cc/pXkzCM9g/1664297728469.jpg",
    text: "Lighting Installation ⚡",
    service: "lighting"
  },
  {
    img: "https://i.postimg.cc/QxhhsH83/1665223017400.jpg",
    text: "Electrical Repair 🔧",
    service: "repair"
  }
];

let index = 0;

function rotateBanner(){
  let item = banners[index];

  document.getElementById("banner-img").src = item.img;
  document.getElementById("banner-text").innerText = item.text;

  index = (index + 1) % banners.length;
}

setInterval(rotateBanner, 4000);
rotateBanner();

/* CLICK BANNER */
function selectServiceFromBanner(){
  let item = banners[index === 0 ? banners.length - 1 : index - 1];

  document.getElementById("service").value = item.service;
  updateInfo();
}

/* SUBMIT */
function submitRequest(e){
  e.preventDefault();

  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let service = document.getElementById("service").value;
  let location = document.getElementById("location").value.trim();
  let date = document.getElementById("date").value;
  let time = document.getElementById("time").value;
  let details = document.getElementById("details").value.trim();

  if(!service){
    alert("Select a service");
    return;
  }

  let price = services[service]?.price || 0;
  let tech = services[service]?.tech || "Auto";

  let msg = `⚡ Service Request\n\n`;
  msg += `Name: ${name}\nPhone: ${phone}\n`;
  msg += `Service: ${service}\nTechnician: ${tech}\n`;
  msg += `Date: ${date} ${time}\n`;
  msg += `Location: ${location}\n`;
  msg += `Details: ${details}\n`;
  msg += `Estimated Price: ₦${price}`;

  window.open("https://wa.me/2349036470778?text=" + encodeURIComponent(msg));
}

</script>

</body>
</html>
