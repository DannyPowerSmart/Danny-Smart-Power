<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Danny Smart Power</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Poppins,sans-serif;
  background:#0f172a;
  color:white;
  padding:20px;
}

.login-box{
  width:100%;
  max-width:420px;
  background:#020617;
  padding:30px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,.4);
}

.logo{
  text-align:center;
  color:#38bdf8;
  font-size:24px;
  font-weight:600;
  margin-bottom:8px;
}

.subtitle{
  text-align:center;
  color:#aaa;
  font-size:14px;
  margin-bottom:25px;
}

input{
  width:100%;
  padding:14px;
  margin-top:14px;
  border:none;
  border-radius:10px;
  outline:none;
  background:#0f172a;
  color:white;
  font-size:14px;
}

input::placeholder{
  color:#888;
}

button{
  width:100%;
  padding:14px;
  margin-top:20px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:#020617;
  font-weight:bold;
  cursor:pointer;
  font-size:15px;
}

button:disabled{
  background:#64748b;
  cursor:not-allowed;
}

.register{
  text-align:center;
  margin-top:20px;
  font-size:14px;
  color:#aaa;
}

.register a{
  color:#38bdf8;
  text-decoration:none;
}

.message{
  margin-top:15px;
  text-align:center;
  font-size:13px;
  min-height:20px;
}
</style>
</head>

<body>

<div class="login-box">

  <div class="logo">Danny Smart Power ⚡</div>

  <div class="subtitle">
    Welcome back. Login to continue.
  </div>

  <form id="loginForm">

    <input
      type="email"
      id="email"
      placeholder="Email address"
      required
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
      required
    >

    <button type="submit" id="loginBtn">
      Login
    </button>

  </form>

  <div class="message" id="message"></div>

  <div class="register">
    Don't have an account?
    <a href="signup.html">Create account</a>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyB48Z_i8k3gV3uHmNUFQjAH9bOvUlAGb44",
  authDomain: "danny-smart-power.firebaseapp.com",
  databaseURL: "https://danny-smart-power-default-rtdb.firebaseio.com",
  projectId: "danny-smart-power",
  storageBucket: "danny-smart-power.firebasestorage.app",
  messagingSenderId: "649735645158",
  appId: "1:649735645158:web:cff518b89721a163679827",
  measurementId: "G-258YKLP5ZS"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

const loginForm = document.getElementById("loginForm");
const loginBtn = document.getElementById("loginBtn");
const message = document.getElementById("message");

loginForm.addEventListener("submit", function(e){

  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  loginBtn.disabled = true;
  loginBtn.innerText = "Logging in...";

  message.innerText = "";

  auth.signInWithEmailAndPassword(email, password)

  .then(() => {

    message.style.color = "#38bdf8";
    message.innerText = "Login successful ⚡";

    setTimeout(() => {
      window.location.href = "index.html";
    }, 1000);

  })

  .catch(error => {

    loginBtn.disabled = false;
    loginBtn.innerText = "Login";

    let errorMessage = "Login failed.";

    if(error.code === "auth/user-not-found"){
      errorMessage = "No account found with this email.";
    }

    else if(error.code === "auth/wrong-password"){
      errorMessage = "Incorrect password.";
    }

    else if(error.code === "auth/invalid-credential"){
      errorMessage = "Incorrect email or password.";
    }

    else if(error.code === "auth/invalid-email"){
      errorMessage = "Please enter a valid email.";
    }

    message.style.color = "#ff6b6b";
    message.innerText = errorMessage;

  });

});

</script>

</body>
</html>
