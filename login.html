<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Danny Smart Power</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial,sans-serif;
  background:#07111f;
  color:white;
  padding:20px;
}

.login-box{
  width:100%;
  max-width:400px;
  background:#0d1b2a;
  padding:30px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 20px 50px rgba(0,0,0,.4);
}

.logo{
  width:65px;
  height:65px;
  margin:0 auto 15px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:20px;
  background:#38bdf8;
  color:#00111c;

  font-size:30px;
}

h1{
  text-align:center;
  font-size:24px;
  margin-bottom:8px;
}

.subtitle{
  text-align:center;
  color:#94a3b8;
  font-size:13px;
  margin-bottom:25px;
}

label{
  display:block;
  margin:15px 0 7px;
  font-size:13px;
}

input{
  width:100%;
  padding:14px;

  border-radius:10px;
  border:1px solid rgba(255,255,255,.1);

  background:#102234;
  color:white;

  outline:none;
  font-size:14px;
}

input:focus{
  border-color:#38bdf8;
}

button{
  width:100%;
  margin-top:22px;
  padding:14px;

  border:none;
  border-radius:10px;

  background:#38bdf8;
  color:#00111c;

  font-weight:bold;
  font-size:15px;

  cursor:pointer;
}

button:disabled{
  opacity:.6;
  cursor:not-allowed;
}

#message{
  text-align:center;
  margin-top:18px;
  font-size:13px;
  line-height:1.5;
}

.back{
  display:block;
  text-align:center;
  margin-top:20px;

  color:#38bdf8;
  text-decoration:none;
  font-size:13px;
}

</style>
</head>

<body>

<div class="login-box">

  <div class="logo">⚡</div>

  <h1>Welcome Back</h1>

  <p class="subtitle">
    Login to Danny Smart Power
  </p>

  <form id="loginForm">

    <label for="email">
      Email Address
    </label>

    <input
      type="email"
      id="email"
      placeholder="Enter your email"
      autocomplete="email"
      required
    >

    <label for="password">
      Password
    </label>

    <input
      type="password"
      id="password"
      placeholder="Enter your password"
      autocomplete="current-password"
      required
    >

    <button
      type="submit"
      id="loginBtn"
    >
      Login
    </button>

  </form>

  <p id="message"></p>

  <a
    class="back"
    href="index.html"
  >
    ← Back to Danny Smart Power
  </a>

</div>


<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>


<script>

const firebaseConfig = {

  apiKey:
  "AIzaSyB48Z_i8k3gV3uHmNUFQjAH9bOvALgb44",

  authDomain:
  "danny-smart-power.firebaseapp.com",

  databaseURL:
  "https://danny-smart-power-default-rtdb.firebaseio.com",

  projectId:
  "danny-smart-power",

  storageBucket:
  "danny-smart-power.firebasestorage.app",

  messagingSenderId:
  "649735645158",

  appId:
  "1:649735645158:web:cff518b89721a163679827",

  measurementId:
  "G-258YKLP5ZS"

};


// START FIREBASE

firebase.initializeApp(firebaseConfig);


// AUTHENTICATION

const auth = firebase.auth();


// ELEMENTS

const loginForm =
document.getElementById("loginForm");

const emailInput =
document.getElementById("email");

const passwordInput =
document.getElementById("password");

const loginBtn =
document.getElementById("loginBtn");

const message =
document.getElementById("message");


// LOGIN

loginForm.addEventListener(
"submit",
async function(event){

  event.preventDefault();


  const email =
  emailInput.value.trim();

  const password =
  passwordInput.value;


  if(!email || !password){

    showMessage(
      "Please enter your email and password.",
      "#f87171"
    );

    return;

  }


  loginBtn.disabled = true;

  loginBtn.textContent =
  "Logging in...";


  try{

    const userCredential =
    await auth.signInWithEmailAndPassword(
      email,
      password
    );


    const user =
    userCredential.user;


    console.log(
      "Logged in UID:",
      user.uid
    );


    showMessage(
      "Login successful! Welcome back ⚡",
      "#4ade80"
    );


    setTimeout(function(){

      window.location.href =
      "chat.html";

    },1000);


  }

  catch(error){

    console.error(
      "Login error:",
      error
    );


    let errorMessage =
    "Unable to login.";


    if(
      error.code ===
      "auth/invalid-credential"
    ){

      errorMessage =
      "Incorrect email or password.";

    }

    else if(
      error.code ===
      "auth/user-not-found"
    ){

      errorMessage =
      "No account was found with this email.";

    }

    else if(
      error.code ===
      "auth/wrong-password"
    ){

      errorMessage =
      "Incorrect password.";

    }

    else if(
      error.code ===
      "auth/invalid-email"
    ){

      errorMessage =
      "Please enter a valid email address.";

    }

    else if(
      error.code ===
      "auth/too-many-requests"
    ){

      errorMessage =
      "Too many attempts. Please try again later.";

    }

    else{

      errorMessage =
      error.message;

    }


    showMessage(
      errorMessage,
      "#f87171"
    );


    loginBtn.disabled =
    false;

    loginBtn.textContent =
    "Login";

  }

});


// MESSAGE FUNCTION

function showMessage(
  text,
  color
){

  message.textContent =
  text;

  message.style.color =
  color;

}


// CHECK IF ALREADY LOGGED IN

auth.onAuthStateChanged(
function(user){

  if(user){

    console.log(
      "User already logged in:",
      user.email
    );

    // Optional:
    // You can redirect already logged-in
    // users automatically.

    // window.location.href = "chat.html";

  }

});

</script>

</body>
</html>
