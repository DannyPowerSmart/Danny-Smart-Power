<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign In | Danny Smart Power</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet"
>

<style>

/* =========================
   RESET
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}


/* =========================
   BODY
========================= */

body{

  min-height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;

  padding:24px;

  font-family:"Inter",sans-serif;

  color:#f8fafc;

  background:

    radial-gradient(
      circle at top left,
      rgba(56,189,248,.12),
      transparent 35%
    ),

    radial-gradient(
      circle at bottom right,
      rgba(14,165,233,.08),
      transparent 35%
    ),

    #020617;

}


/* =========================
   LOGIN CONTAINER
========================= */

.auth-wrapper{

  width:100%;
  max-width:460px;

}


/* =========================
   BRAND
========================= */

.brand{

  text-align:center;

  margin-bottom:22px;

}

.brand-icon{

  width:62px;
  height:62px;

  margin:0 auto 14px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:18px;

  color:#020617;

  font-size:30px;

  background:linear-gradient(
    135deg,
    #38bdf8,
    #0ea5e9
  );

  box-shadow:
  0 10px 30px
  rgba(14,165,233,.25);

}

.brand-name{

  font-size:21px;
  font-weight:800;

  letter-spacing:-.5px;

}

.brand-subtitle{

  margin-top:6px;

  color:#94a3b8;

  font-size:13px;

}


/* =========================
   CARD
========================= */

.auth-card{

  padding:30px;

  border-radius:22px;

  background:

    linear-gradient(
      145deg,
      rgba(15,23,42,.96),
      rgba(15,23,42,.82)
    );

  border:1px solid
  rgba(148,163,184,.12);

  box-shadow:

    0 25px 70px
    rgba(0,0,0,.35);

}


/* =========================
   HEADER
========================= */

.auth-header{

  margin-bottom:26px;

}

.auth-header h1{

  font-size:26px;

  letter-spacing:-.7px;

}

.auth-header p{

  margin-top:8px;

  color:#94a3b8;

  font-size:14px;

  line-height:1.6;

}


/* =========================
   FORM
========================= */

.form-group{

  margin-bottom:18px;

}

.form-group label{

  display:block;

  margin-bottom:8px;

  font-size:13px;

  font-weight:600;

  color:#cbd5e1;

}


/* =========================
   INPUT
========================= */

.input-wrapper{

  position:relative;

}

.input-wrapper input{

  width:100%;

  height:50px;

  padding:0 15px;

  border-radius:12px;

  border:1px solid
  rgba(148,163,184,.16);

  outline:none;

  color:white;

  background:#0b1728;

  font-size:14px;

  transition:.2s ease;

}

.input-wrapper input:focus{

  border-color:#38bdf8;

  box-shadow:

    0 0 0 3px
    rgba(56,189,248,.1);

}

.input-wrapper input::placeholder{

  color:#64748b;

}


/* =========================
   PASSWORD TOGGLE
========================= */

.password-toggle{

  position:absolute;

  top:50%;
  right:14px;

  transform:translateY(-50%);

  border:none;

  background:none;

  color:#94a3b8;

  cursor:pointer;

  font-size:17px;

}

.password-toggle:hover{

  color:#38bdf8;

}


/* =========================
   OPTIONS
========================= */

.form-options{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-top:5px;

  font-size:12px;

}

.remember{

  display:flex;

  align-items:center;

  gap:7px;

  color:#94a3b8;

}

.remember input{

  accent-color:#38bdf8;

}

.forgot{

  color:#38bdf8;

  text-decoration:none;

}

.forgot:hover{

  text-decoration:underline;

}


/* =========================
   LOGIN BUTTON
========================= */

.login-btn{

  width:100%;

  height:52px;

  margin-top:24px;

  border:none;

  border-radius:12px;

  background:linear-gradient(
    135deg,
    #38bdf8,
    #0ea5e9
  );

  color:#00111c;

  font-size:15px;

  font-weight:800;

  cursor:pointer;

  transition:.2s ease;

}

.login-btn:hover{

  transform:translateY(-1px);

  box-shadow:

    0 10px 25px
    rgba(14,165,233,.25);

}

.login-btn:disabled{

  opacity:.65;

  cursor:not-allowed;

  transform:none;

}


/* =========================
   LOADING
========================= */

.loading{

  display:inline-flex;

  align-items:center;

  gap:9px;

}

.spinner{

  width:17px;
  height:17px;

  border:2px solid
  rgba(0,17,28,.3);

  border-top-color:#00111c;

  border-radius:50%;

  animation:spin .7s linear infinite;

}

@keyframes spin{

  to{

    transform:rotate(360deg);

  }

}


/* =========================
   MESSAGE
========================= */

.message{

  display:none;

  margin-top:18px;

  padding:12px 14px;

  border-radius:10px;

  font-size:13px;

  line-height:1.5;

}

.message.show{

  display:block;

}

.message.error{

  color:#fecaca;

  background:rgba(239,68,68,.1);

  border:1px solid
  rgba(239,68,68,.2);

}

.message.success{

  color:#bbf7d0;

  background:rgba(34,197,94,.1);

  border:1px solid
  rgba(34,197,94,.2);

}


/* =========================
   FOOTER
========================= */

.auth-footer{

  margin-top:24px;

  text-align:center;

  color:#94a3b8;

  font-size:13px;

}

.auth-footer a{

  color:#38bdf8;

  font-weight:600;

  text-decoration:none;

}

.auth-footer a:hover{

  text-decoration:underline;

}


/* =========================
   BACK LINK
========================= */

.back-link{

  display:block;

  margin-top:20px;

  text-align:center;

  color:#64748b;

  text-decoration:none;

  font-size:13px;

  transition:.2s;

}

.back-link:hover{

  color:#38bdf8;

}


/* =========================
   MOBILE
========================= */

@media(max-width:480px){

  body{

    padding:16px;

  }

  .auth-card{

    padding:24px 20px;

  }

  .auth-header h1{

    font-size:23px;

  }

}

</style>

</head>


<body>


<div class="auth-wrapper">


  <!-- BRAND -->

  <div class="brand">

    <div class="brand-icon">

      ⚡

    </div>

    <div class="brand-name">

      Danny Smart Power

    </div>

    <div class="brand-subtitle">

      Smart power. Reliable service.

    </div>

  </div>


  <!-- LOGIN CARD -->

  <div class="auth-card">


    <div class="auth-header">

      <h1>

        Welcome back

      </h1>

      <p>

        Sign in to continue to your Danny Smart Power account.

      </p>

    </div>


    <form id="loginForm">


      <!-- EMAIL -->

      <div class="form-group">

        <label for="email">

          Email address

        </label>

        <div class="input-wrapper">

          <input

            type="email"

            id="email"

            placeholder="you@example.com"

            autocomplete="email"

            required

          >

        </div>

      </div>


      <!-- PASSWORD -->

      <div class="form-group">

        <label for="password">

          Password

        </label>

        <div class="input-wrapper">

          <input

            type="password"

            id="password"

            placeholder="Enter your password"

            autocomplete="current-password"

            required

          >

          <button

            type="button"

            class="password-toggle"

            id="togglePassword"

            aria-label="Show password"

          >

            👁

          </button>

        </div>

      </div>


      <!-- OPTIONS -->

      <div class="form-options">

        <label class="remember">

          <input

            type="checkbox"

            id="rememberMe"

          >

          Remember me

        </label>


        <a

          href="forgot-password.html"

          class="forgot"

        >

          Forgot password?

        </a>

      </div>


      <!-- BUTTON -->

      <button

        type="submit"

        class="login-btn"

        id="loginBtn"

      >

        Sign in

      </button>


    </form>


    <!-- MESSAGE -->

    <div

      id="message"

      class="message"

    ></div>


    <!-- REGISTER -->

    <div class="auth-footer">

      Don't have an account?

      <a href="signup.html">

        Create account

      </a>

    </div>


  </div>


  <!-- BACK -->

  <a

    href="index.html"

    class="back-link"

  >

    ← Back to Danny Smart Power

  </a>


</div>


<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>


<script>


/* =========================
   FIREBASE CONFIG
========================= */


  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyB48Z_i8k3gV3uHmNUFQjAH9bOvUlAGb44",
  authDomain: "danny-smart-power.firebaseapp.com",
  databaseURL: "https://danny-smart-power-default-rtdb.firebaseio.com",
  projectId: "danny-smart-power",
  storageBucket: "danny-smart-power.firebasestorage.app",
  messagingSenderId: "649735645158",
  appId: "1:649735645158:web:cff518b89721a163679827",
  measurementId: "G-258YKLP5ZS"
};

firebase.initializeApp(firebaseConfig);


const auth =
firebase.auth();


/* =========================
   ELEMENTS
========================= */

const loginForm =
document.getElementById("loginForm");

const emailInput =
document.getElementById("email");

const passwordInput =
document.getElementById("password");

const loginBtn =
document.getElementById("loginBtn");

const messageBox =
document.getElementById("message");

const togglePassword =
document.getElementById("togglePassword");


/* =========================
   PASSWORD VISIBILITY
========================= */

togglePassword.addEventListener(

  "click",

  function(){

    const isPassword =
    passwordInput.type === "password";


    passwordInput.type =
    isPassword
    ? "text"
    : "password";


    togglePassword.textContent =
    isPassword
    ? "🙈"
    : "👁";

  }

);


/* =========================
   LOGIN
========================= */

loginForm.addEventListener(

  "submit",

  async function(event){

    event.preventDefault();


    const email =
    emailInput.value.trim();


    const password =
    passwordInput.value;


    if(!email || !password){

      showMessage(

        "Please enter your email and password.",

        "error"

      );

      return;

    }


    loginBtn.disabled =
    true;


    loginBtn.innerHTML = `

      <span class="loading">

        <span class="spinner"></span>

        Signing in...

      </span>

    `;


    try{


      /* REMEMBER LOGIN */

      const persistence =

      document.getElementById(
        "rememberMe"
      ).checked

      ? firebase.auth.Auth.Persistence.LOCAL

      : firebase.auth.Auth.Persistence.SESSION;


      await auth.setPersistence(
        persistence
      );


      /* LOGIN */

      const result =

      await auth.signInWithEmailAndPassword(

        email,

        password

      );


      const user =
      result.user;


      console.log(

        "Logged in:",

        user.uid

      );


      showMessage(

        "Login successful. Welcome back ⚡",

        "success"

      );


      setTimeout(

        function(){

          window.location.href =
          "home.html";

        },

        800

      );


    }


    catch(error){


      console.error(error);


      let text =
      "Unable to sign in. Please try again.";


      switch(error.code){

        case "auth/invalid-credential":

          text =
          "Incorrect email or password.";

          break;


        case "auth/user-not-found":

          text =
          "No account was found with this email.";

          break;


        case "auth/wrong-password":

          text =
          "Incorrect email or password.";

          break;


        case "auth/invalid-email":

          text =
          "Please enter a valid email address.";

          break;


        case "auth/too-many-requests":

          text =
          "Too many attempts. Please try again later.";

          break;


        case "auth/network-request-failed":

          text =
          "Network error. Check your internet connection.";

          break;


        default:

          text =
          error.message;

      }


      showMessage(

        text,

        "error"

      );


      loginBtn.disabled =
      false;


      loginBtn.textContent =
      "Sign in";

    }

  }

);


/* =========================
   MESSAGE
========================= */

function showMessage(

  text,

  type

){

  messageBox.textContent =
  text;


  messageBox.className =

  "message show " + type;

}


/* =========================
   ALREADY LOGGED IN
========================= */

auth.onAuthStateChanged(

  function(user){

    if(user){

      console.log(

        "Active user:",

        user.email

      );

      // If you want automatic
      // redirect for already
      // logged-in users, enable:

      // window.location.href =
      // "home.html";

    }

  }

);

</script>

</body>

</html>
