<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders - Danny Smart Power</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
}

/* HEADER */
header {
  background: #020617;
  padding: 15px 8%;
  display: flex;
  justify-content: space-between;
}

a { color: #38bdf8; text-decoration: none; }

/* CONTAINER */
.container {
  padding: 20px 8%;
}

/* ORDER CARD */
.order {
  background: #020617;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.order h3 {
  margin-bottom: 10px;
}

.item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 5px;
  font-size: 14px;
}

.total {
  margin-top: 10px;
  font-weight: bold;
  color: #38bdf8;
}

.date {
  font-size: 12px;
  color: #aaa;
}

/* EMPTY */
.empty {
  text-align: center;
  margin-top: 50px;
  color: #aaa;
}
</style>
</head>

<body>

<header>
  <h2>My Orders 📦</h2>
  <a href="shop.html">← Back to Shop</a>
</header>

<div class="container" id="orders-container"></div>

<script>
function loadOrders(){
  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  let container = document.getElementById("orders-container");

  if(orders.length === 0){
    container.innerHTML = `<p class="empty">No orders yet 📭</p>`;
    return;
  }

  container.innerHTML = "";

  orders.reverse().forEach(order => {

    let itemsHTML = "";
    let total = 0;

    order.cart.forEach(item=>{
      let subtotal = item.price * item.qty;
      total += subtotal;

      itemsHTML += `
        <div class="item">
          <span>${item.name} x${item.qty}</span>
          <span>₦${subtotal}</span>
        </div>
      `;
    });

    container.innerHTML += `
      <div class="order">
        <h3>${order.name}</h3>
        <p>${order.address}</p>

        ${itemsHTML}

        <p class="total">Total: ₦${total}</p>
        <p class="date">${order.date}</p>
      </div>
    `;
  });
}

loadOrders();
</script>

</body>
</html>
