<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Settings | Danny Smart Power</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
rel="stylesheet">


<style>

/* =========================
   RESET
========================= */

*{

  box-sizing:border-box;

  margin:0;

  padding:0;

}


/* =========================
   VARIABLES
========================= */

:root{

  --bg:#0f172a;

  --header:#020617;

  --card:#111e30;

  --card2:#17253a;

  --border:rgba(148,163,184,.15);

  --blue:#38bdf8;

  --blue2:#0284c7;

  --green:#22c55e;

  --red:#ef4444;

  --yellow:#facc15;

  --text:#f8fafc;

  --muted:#94a3b8;

}


/* =========================
   LIGHT MODE
========================= */

body.light{

  --bg:#f1f5f9;

  --header:#ffffff;

  --card:#ffffff;

  --card2:#e2e8f0;

  --border:rgba(15,23,42,.12);

  --text:#0f172a;

  --muted:#64748b;

}


/* =========================
   BODY
========================= */

body{

  min-height:100vh;

  font-family:'Poppins',sans-serif;

  background:

    radial-gradient(

      circle at top left,

      rgba(56,189,248,.10),

      transparent 35%

    ),

    var(--bg);

  color:var(--text);

  transition:.3s;

}


/* =========================
   HEADER
========================= */

header{

  height:78px;

  display:flex;

  align-items:center;

  justify-content:space-between;

  padding:0 18px;

  background:var(--header);

  border-bottom:1px solid var(--border);

  position:sticky;

  top:0;

  z-index:10;

}


.header-left{

  display:flex;

  align-items:center;

  gap:12px;

}


.back-button{

  width:44px;

  height:44px;

  border:none;

  border-radius:50%;

  background:transparent;

  color:var(--text);

  font-size:28px;

  cursor:pointer;

}


.back-button:hover{

  background:var(--card2);

}


.logo{

  width:42px;

  height:42px;

  border-radius:50%;

  display:flex;

  align-items:center;

  justify-content:center;

  font-size:22px;

  background:

    linear-gradient(

      135deg,

      var(--blue),

      var(--blue2)

    );

  color:#00111c;

}


header h1{

  font-size:18px;

}


/* =========================
   MAIN
========================= */

main{

  width:100%;

  max-width:850px;

  margin:auto;

  padding:25px 15px 50px;

}


/* =========================
   ACCOUNT CARD
========================= */

.account-card{

  display:flex;

  align-items:center;

  gap:15px;

  padding:20px;

  background:var(--card);

  border:1px solid var(--border);

  border-radius:20px;

  margin-bottom:20px;

}


.account-avatar{

  width:65px;

  height:65px;

  border-radius:50%;

  object-fit:cover;

  border:3px solid var(--blue);

  background:#12324b;

}


.account-info{

  min-width:0;

}


.account-info h2{

  font-size:18px;

  word-break:break-word;

}


.account-info p{

  color:var(--muted);

  font-size:12px;

  word-break:break-word;

}


.verified{

  display:inline-block;

  margin-top:5px;

  padding:3px 8px;

  border-radius:20px;

  font-size:10px;

  background:rgba(34,197,94,.12);

  color:#86efac;

}


.not-verified{

  display:inline-block;

  margin-top:5px;

  padding:3px 8px;

  border-radius:20px;

  font-size:10px;

  background:rgba(250,204,21,.12);

  color:#fde68a;

}


/* =========================
   SECTION
========================= */

.settings-section{

  margin-top:20px;

}


.section-title{

  color:var(--muted);

  font-size:12px;

  text-transform:uppercase;

  letter-spacing:.8px;

  margin:0 5px 9px;

}


/* =========================
   SETTINGS CARD
========================= */

.settings-card{

  overflow:hidden;

  background:var(--card);

  border:1px solid var(--border);

  border-radius:20px;

}


.setting-item{

  width:100%;

  min-height:70px;

  padding:14px 16px;

  display:flex;

  align-items:center;

  gap:14px;

  border:none;

  border-bottom:1px solid var(--border);

  background:transparent;

  color:var(--text);

  font-family:inherit;

  text-align:left;

  cursor:pointer;

}


.setting-item:last-child{

  border-bottom:none;

}


.setting-item:hover{

  background:var(--card2);

}


.setting-icon{

  width:42px;

  height:42px;

  min-width:42px;

  border-radius:13px;

  display:flex;

  align-items:center;

  justify-content:center;

  background:var(--card2);

  font-size:20px;

}


.setting-content{

  flex:1;

  min-width:0;

}


.setting-content strong{

  display:block;

  font-size:14px;

}


.setting-content span{

  display:block;

  color:var(--muted);

  font-size:11px;

  margin-top:3px;

}


.arrow{

  color:var(--muted);

  font-size:20px;

}


/* =========================
   SWITCH
========================= */

.switch{

  position:relative;

  width:48px;

  height:26px;

}


.switch input{

  opacity:0;

  width:0;

  height:0;

}


.slider{

  position:absolute;

  inset:0;

  cursor:pointer;

  border-radius:30px;

  background:#475569;

  transition:.3s;

}


.slider:before{

  content:"";

  position:absolute;

  width:20px;

  height:20px;

  left:3px;

  top:3px;

  border-radius:50%;

  background:white;

  transition:.3s;

}


.switch input:checked + .slider{

  background:var(--blue2);

}


.switch input:checked + .slider:before{

  transform:translateX(22px);

}


/* =========================
   DANGER
========================= */

.danger-card{

  border-color:rgba(239,68,68,.25);

}


.danger-item{

  color:#fca5a5;

}


.danger-item .setting-icon{

  background:rgba(239,68,68,.12);

}


/* =========================
   TOAST
========================= */

.toast{

  position:fixed;

  left:50%;

  bottom:25px;

  transform:

    translate(-50%,120px);

  opacity:0;

  padding:13px 20px;

  border-radius:12px;

  background:#020617;

  color:white;

  font-size:13px;

  box-shadow:0 10px 30px rgba(0,0,0,.3);

  transition:.3s;

  z-index:100;

}


.toast.show{

  transform:

    translate(-50%,0);

  opacity:1;

}


/* =========================
   LOADING
========================= */

.loading{

  position:fixed;

  inset:0;

  display:flex;

  align-items:center;

  justify-content:center;

  background:var(--bg);

  color:var(--muted);

  z-index:200;

}


.loading.hidden{

  display:none;

}


/* =========================
   MOBILE
========================= */

@media(max-width:600px){

  main{

    padding:18px 12px 40px;

  }


  header h1{

    font-size:16px;

  }


  .account-card{

    padding:16px;

  }

}

</style>

</head>


<body>


<!-- LOADING -->

<div
class="loading"
id="loading">

Loading settings...

</div>


<!-- HEADER -->

<header>

  <div
  class="header-left">

    <button
    class="back-button"
    id="backButton">

      ←

    </button>


    <div
    class="logo">

      ⚡

    </div>


    <h1>

      Settings

    </h1>

  </div>

</header>


<!-- MAIN -->

<main>


  <!-- ACCOUNT -->

  <section
  class="account-card">


    <img
    id="accountAvatar"
    class="account-avatar"
    alt="Profile picture">


    <div
    class="account-info">


      <h2
      id="accountName">

        Loading...

      </h2>


      <p
      id="accountEmail">

        Loading...

      </p>


      <span
      id="verificationStatus">

        Checking account...

      </span>

    </div>

  </section>


  <!-- ACCOUNT SETTINGS -->

  <section
  class="settings-section">


    <div
    class="section-title">

      Account

    </div>


    <div
    class="settings-card">


      <button
      class="setting-item"
      id="profileButton">


        <div
        class="setting-icon">

          👤

        </div>


        <div
        class="setting-content">

          <strong>

            My Profile

          </strong>


          <span>

            Edit your personal information

          </span>

        </div>


        <div
        class="arrow">

          ›

        </div>


      </button>


      <button
      class="setting-item"
      id="passwordButton">


        <div
        class="setting-icon">

          🔐

        </div>


        <div
        class="setting-content">

          <strong>

            Change Password

          </strong>


          <span>

            Receive a password reset email

          </span>

        </div>


        <div
        class="arrow">

          ›

        </div>


      </button>


      <button
      class="setting-item"
      id="verificationButton">


        <div
        class="setting-icon">

          📧

        </div>


        <div
        class="setting-content">

          <strong>

            Email Verification

          </strong>


          <span>

            Verify your email address

          </span>

        </div>


        <div
        class="arrow">

          ›

        </div>


      </button>


    </div>

  </section>


  <!-- APP SETTINGS -->

  <section
  class="settings-section">


    <div
    class="section-title">

      App Preferences

    </div>


    <div
    class="settings-card">


      <!-- DARK MODE -->

      <div
      class="setting-item">


        <div
        class="setting-icon">

          🌙

        </div>


        <div
        class="setting-content">

          <strong>

            Dark Mode

          </strong>


          <span
          id="themeText">

            Dark theme enabled

          </span>

        </div>


        <label
        class="switch">


          <input
          type="checkbox"
          id="themeToggle"
          checked>


          <span
          class="slider">

          </span>


        </label>

      </div>


      <!-- NOTIFICATIONS -->

      <div
      class="setting-item">


        <div
        class="setting-icon">

          🔔

        </div>


        <div
        class="setting-content">

          <strong>

            Notifications

          </strong>


          <span>

            Allow app notifications

          </span>

        </div>


        <label
        class="switch">


          <input
          type="checkbox"
          id="notificationToggle"
          checked>


          <span
          class="slider">

          </span>


        </label>

      </div>


    </div>

  </section>


  <!-- QUICK LINKS -->

  <section
  class="settings-section">


    <div
    class="section-title">

      Quick Access

    </div>


    <div
    class="settings-card">


      <button
      class="setting-item"
      id="chatButton">


        <div
        class="setting-icon">

          💬

        </div>


        <div
        class="setting-content">

          <strong>

            Chat with Danny

          </strong>


          <span>

            Get help from Danny Smart Power

          </span>

        </div>


        <div
        class="arrow">

          ›

        </div>


      </button>


      <button
      class="setting-item"
      id="shopButton">


        <div
        class="setting-icon">

          🛍️

        </div>


        <div
        class="setting-content">

          <strong>

            Continue Shopping

          </strong>


          <span>

            Browse electrical and solar products

          </span>

        </div>


        <div
        class="arrow">

          ›

        </div>


      </button>


      <button
      class="setting-item"
      id="ordersButton">


        <div
        class="setting-icon">

          📦

        </div>


        <div
        class="setting-content">

          <strong>

            My Orders

          </strong>


          <span>

            View your orders

          </span>

        </div>


        <div
        class="arrow">

          ›

        </div>


      </button>


    </div>

  </section>


  <!-- ACCOUNT ACTIONS -->

  <section
  class="settings-section">


    <div
    class="section-title">

      Account Actions

    </div>


    <div
    class="settings-card">


      <button
      class="setting-item"
      id="logoutButton">


        <div
        class="setting-icon">

          🚪

        </div>


        <div
        class="setting-content">

          <strong>

            Sign Out

          </strong>


          <span>

            Sign out from this account

          </span>

        </div>


        <div
        class="arrow">

          ›

        </div>


      </button>


    </div>

  </section>


  <!-- DANGER ZONE -->

  <section
  class="settings-section">


    <div
    class="section-title">

      Danger Zone

    </div>


    <div
    class="settings-card danger-card">


      <button
      class="setting-item danger-item"
      id="deleteButton">


        <div
        class="setting-icon">

          🗑️

        </div>


        <div
        class="setting-content">

          <strong>

            Delete Account

          </strong>


          <span>

            Permanently delete your account

          </span>

        </div>


        <div
        class="arrow">

          ›

        </div>


      </button>


    </div>

  </section>


</main>


<!-- TOAST -->

<div
class="toast"
id="toast">

Settings saved ✓

</div>


<!-- FIREBASE -->

<script
src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js">
</script>


<script
src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js">
</script>


<script>


/* =========================
   FIREBASE CONFIG
========================= */

const firebaseConfig = {

  apiKey:
  "AIzaSyB48Z_i8k3gV3uHmNUFQjAH9bOvUlAGb44",

  authDomain:
  "danny-smart-power.firebaseapp.com",

  databaseURL:
  "https://danny-smart-power-default-rtdb.firebaseio.com",

  projectId:
  "danny-smart-power",

  storageBucket:
  "danny-smart-power.firebasestorage.app",

  messagingSenderId:
  "649735645158",

  appId:
  "1:649735645158:web:cff518b89721a163679827",

  measurementId:
  "G-258YKLP5ZS"

};


firebase.initializeApp(
  firebaseConfig
);


const auth =
firebase.auth();


/* =========================
   ELEMENTS
========================= */

const loading =
document.getElementById(
  "loading"
);


const accountName =
document.getElementById(
  "accountName"
);


const accountEmail =
document.getElementById(
  "accountEmail"
);


const accountAvatar =
document.getElementById(
  "accountAvatar"
);


const verificationStatus =
document.getElementById(
  "verificationStatus"
);


const themeToggle =
document.getElementById(
  "themeToggle"
);


const notificationToggle =
document.getElementById(
  "notificationToggle"
);


const themeText =
document.getElementById(
  "themeText"
);


const toast =
document.getElementById(
  "toast"
);


/* =========================
   DEFAULT AVATAR
========================= */

function setDefaultAvatar(name){

  const letter =
    name
    .charAt(0)
    .toUpperCase();


  accountAvatar.src =

    "data:image/svg+xml;charset=UTF-8," +

    encodeURIComponent(`

      <svg
      xmlns="http://www.w3.org/2000/svg"
      width="300"
      height="300">

        <rect
        width="100%"
        height="100%"
        fill="#12324b"/>


        <text
        x="50%"
        y="55%"
        dominant-baseline="middle"
        text-anchor="middle"
        font-size="130"
        fill="#38bdf8"
        font-family="Arial">

          ${letter}

        </text>

      </svg>

    `);

}


/* =========================
   AUTH
========================= */

auth.onAuthStateChanged(

  function(user){

    if(!user){

      window.location.href =
      "login.html";

      return;

    }


    const name =

      user.displayName ||

      user.email
      .split("@")[0];


    accountName.textContent =
      name;


    accountEmail.textContent =
      user.email;


    if(user.photoURL){

      accountAvatar.src =
        user.photoURL;

    }

    else{

      setDefaultAvatar(name);

    }


    if(user.emailVerified){

      verificationStatus.textContent =
        "✓ Email verified";

      verificationStatus.className =
        "verified";

    }

    else{

      verificationStatus.textContent =
        "⚠ Email not verified";

      verificationStatus.className =
        "not-verified";

    }


    loadSettings();


    loading.classList.add(
      "hidden"
    );

  }

);


/* =========================
   LOAD SETTINGS
========================= */

function loadSettings(){

  const darkMode =
    localStorage.getItem(
      "dspDarkMode"
    );


  const notifications =
    localStorage.getItem(
      "dspNotifications"
    );


  if(darkMode === "false"){

    document.body.classList.add(
      "light"
    );


    themeToggle.checked =
      false;


    themeText.textContent =
      "Light theme enabled";

  }

  else{

    themeToggle.checked =
      true;

  }


  if(notifications === "false"){

    notificationToggle.checked =
      false;

  }

  else{

    notificationToggle.checked =
      true;

  }

}


/* =========================
   THEME
========================= */

themeToggle.addEventListener(

  "change",

  function(){

    if(themeToggle.checked){

      document.body.classList.remove(
        "light"
      );


      localStorage.setItem(
        "dspDarkMode",
        "true"
      );


      themeText.textContent =
        "Dark theme enabled";

    }

    else{

      document.body.classList.add(
        "light"
      );


      localStorage.setItem(
        "dspDarkMode",
        "false"
      );


      themeText.textContent =
        "Light theme enabled";

    }


    showToast(
      "Theme saved ✓"
    );

  }

);


/* =========================
   NOTIFICATIONS
========================= */

notificationToggle.addEventListener(

  "change",

  function(){

    localStorage.setItem(

      "dspNotifications",

      notificationToggle.checked
      ? "true"
      : "false"

    );


    showToast(
      "Notification setting saved ✓"
    );

  }

);


/* =========================
   NAVIGATION
========================= */

document
.getElementById(
  "backButton"
)
.addEventListener(

  "click",

  function(){

    window.history.back();

  }

);


document
.getElementById(
  "profileButton"
)
.addEventListener(

  "click",

  function(){

    window.location.href =
      "profile.html";

  }

);


document
.getElementById(
  "chatButton"
)
.addEventListener(

  "click",

  function(){

    window.location.href =
      "chat.html";

  }

);


document
.getElementById(
  "shopButton"
)
.addEventListener(

  "click",

  function(){

    window.location.href =
      "shop.html";

  }

);


document
.getElementById(
  "ordersButton"
)
.addEventListener(

  "click",

  function(){

    window.location.href =
      "orders.html";

  }

);


/* =========================
   CHANGE PASSWORD
========================= */

document
.getElementById(
  "passwordButton"
)
.addEventListener(

  "click",

  async function(){

    const user =
      auth.currentUser;


    if(!user){

      return;

    }


    const confirmed =
      confirm(

        "Send a password reset email to:\n\n" +

        user.email +

        "?"

      );


    if(!confirmed){

      return;

    }


    try{

      await auth.sendPasswordResetEmail(
        user.email
      );


      alert(

        "Password reset email sent ✓\n\n" +

        "Check your inbox and spam folder."

      );

    }

    catch(error){

      alert(
        error.message
      );

    }

  }

);


/* =========================
   EMAIL VERIFICATION
========================= */

document
.getElementById(
  "verificationButton"
)
.addEventListener(

  "click",

  async function(){

    const user =
      auth.currentUser;


    if(!user){

      return;

    }


    if(user.emailVerified){

      alert(
        "Your email is already verified ✓"
      );

      return;

    }


    try{

      await user.sendEmailVerification();


      alert(

        "Verification email sent ✓\n\n" +

        "Please check your inbox and spam folder."

      );

    }

    catch(error){

      alert(
        error.message
      );

    }

  }

);


/* =========================
   LOGOUT
========================= */

document
.getElementById(
  "logoutButton"
)
.addEventListener(

  "click",

  async function(){

    const confirmed =
      confirm(
        "Are you sure you want to sign out?"
      );


    if(!confirmed){

      return;

    }


    await auth.signOut();


    window.location.href =
      "login.html";

  }

);


/* =========================
   DELETE ACCOUNT
========================= */

document
.getElementById(
  "deleteButton"
)
.addEventListener(

  "click",

  async function(){

    const user =
      auth.currentUser;


    if(!user){

      return;

    }


    const first =
      confirm(

        "WARNING!\n\n" +

        "This action may permanently delete your account.\n\n" +

        "Continue?"

      );


    if(!first){

      return;

    }


    const typed =
      prompt(
        'Type "DELETE" to confirm.'
      );


    if(typed !== "DELETE"){

      alert(
        "Account deletion cancelled."
      );

      return;

    }


    try{

      await user.delete();


      alert(
        "Account deleted successfully."
      );


      window.location.href =
        "login.html";

    }

    catch(error){

      alert(

        "For security reasons, please sign in again before deleting your account."

      );


      console.error(error);

    }

  }

);


/* =========================
   TOAST
========================= */

function showToast(text){

  toast.textContent =
    text;


  toast.classList.add(
    "show"
  );


  setTimeout(

    function(){

      toast.classList.remove(
        "show"
      );

    },

    2500

  );

}

</script>

</body>

</html>
