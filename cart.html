<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>My Cart | Danny Smart Power</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
rel="stylesheet">


<style>

/* =========================
   RESET
========================= */

*{

  margin:0;

  padding:0;

  box-sizing:border-box;

}


/* =========================
   VARIABLES
========================= */

:root{

  --bg:#0f172a;

  --header:#020617;

  --card:#111e30;

  --card2:#17253a;

  --border:rgba(148,163,184,.15);

  --blue:#38bdf8;

  --blue2:#0284c7;

  --green:#22c55e;

  --red:#ef4444;

  --text:#f8fafc;

  --muted:#94a3b8;

}


/* =========================
   BODY
========================= */

body{

  min-height:100vh;

  font-family:'Poppins',sans-serif;

  color:var(--text);

  background:

    radial-gradient(

      circle at top left,

      rgba(56,189,248,.08),

      transparent 35%

    ),

    var(--bg);

}


/* =========================
   HEADER
========================= */

header{

  position:sticky;

  top:0;

  z-index:20;

  height:76px;

  padding:0 7%;

  display:flex;

  align-items:center;

  justify-content:space-between;

  background:rgba(2,6,23,.95);

  border-bottom:1px solid var(--border);

  backdrop-filter:blur(12px);

}


.logo{

  display:flex;

  align-items:center;

  gap:10px;

  color:var(--blue);

  font-size:20px;

  font-weight:700;

}


.logo-icon{

  width:40px;

  height:40px;

  display:flex;

  align-items:center;

  justify-content:center;

  border-radius:50%;

  background:

    linear-gradient(

      135deg,

      var(--blue),

      var(--blue2)

    );

  color:#00111c;

  font-size:20px;

}


.back-link{

  color:var(--blue);

  text-decoration:none;

  font-size:14px;

  font-weight:500;

}


.back-link:hover{

  text-decoration:underline;

}


/* =========================
   MAIN
========================= */

main{

  width:100%;

  max-width:1200px;

  margin:auto;

  padding:30px 7% 60px;

}


.page-heading{

  margin-bottom:25px;

}


.page-heading h1{

  font-size:28px;

  margin-bottom:5px;

}


.page-heading p{

  color:var(--muted);

  font-size:14px;

}


/* =========================
   CART LAYOUT
========================= */

.cart-layout{

  display:grid;

  grid-template-columns:

    minmax(0,1fr)

    350px;

  gap:25px;

  align-items:start;

}


/* =========================
   CART LIST
========================= */

.cart-list{

  display:flex;

  flex-direction:column;

  gap:15px;

}


/* =========================
   CART ITEM
========================= */

.cart-item{

  display:flex;

  align-items:center;

  gap:17px;

  padding:16px;

  background:

    linear-gradient(

      145deg,

      var(--card),

      #0d1828

    );

  border:1px solid var(--border);

  border-radius:18px;

  transition:.2s;

}


.cart-item:hover{

  border-color:

    rgba(56,189,248,.4);

  transform:translateY(-2px);

}


.product-image{

  width:110px;

  height:110px;

  flex-shrink:0;

  object-fit:cover;

  border-radius:14px;

  background:var(--card2);

}


.item-info{

  flex:1;

  min-width:0;

}


.item-info h3{

  font-size:16px;

  margin-bottom:5px;

  white-space:nowrap;

  overflow:hidden;

  text-overflow:ellipsis;

}


.item-category{

  color:var(--muted);

  font-size:12px;

  margin-bottom:7px;

}


.item-price{

  color:var(--blue);

  font-weight:600;

  font-size:15px;

}


/* =========================
   QUANTITY
========================= */

.quantity-box{

  display:flex;

  align-items:center;

  gap:10px;

  margin-top:12px;

}


.quantity-box button{

  width:30px;

  height:30px;

  border:none;

  border-radius:8px;

  background:var(--card2);

  color:white;

  font-size:18px;

  cursor:pointer;

}


.quantity-box button:hover{

  background:var(--blue);

  color:#00111c;

}


.quantity-box span{

  min-width:25px;

  text-align:center;

  font-weight:600;

}


/* =========================
   ITEM RIGHT
========================= */

.item-right{

  text-align:right;

  min-width:120px;

}


.item-subtotal{

  font-weight:600;

  margin-bottom:12px;

}


.remove-button{

  border:none;

  background:rgba(239,68,68,.12);

  color:#fca5a5;

  padding:8px 11px;

  border-radius:8px;

  cursor:pointer;

  font-family:inherit;

  font-size:12px;

}


.remove-button:hover{

  background:var(--red);

  color:white;

}


/* =========================
   SUMMARY
========================= */

.summary{

  position:sticky;

  top:100px;

  padding:22px;

  background:

    linear-gradient(

      145deg,

      var(--card),

      #0d1828

    );

  border:1px solid var(--border);

  border-radius:20px;

}


.summary h2{

  font-size:19px;

  margin-bottom:20px;

}


.summary-row{

  display:flex;

  justify-content:space-between;

  gap:15px;

  margin-bottom:13px;

  color:var(--muted);

  font-size:14px;

}


.summary-row.total{

  padding-top:15px;

  margin-top:8px;

  border-top:1px solid var(--border);

  color:white;

  font-size:19px;

  font-weight:700;

}


.total-price{

  color:var(--blue);

}


/* =========================
   BUTTONS
========================= */

.checkout-button,

.whatsapp-button,

.shopping-button{

  width:100%;

  border:none;

  padding:14px;

  border-radius:11px;

  font-family:inherit;

  font-weight:600;

  cursor:pointer;

  margin-top:14px;

  transition:.2s;

}


.checkout-button{

  background:var(--blue);

  color:#00111c;

}


.checkout-button:hover{

  background:#7dd3fc;

}


.whatsapp-button{

  background:#22c55e;

  color:white;

}


.whatsapp-button:hover{

  background:#16a34a;

}


.shopping-button{

  background:var(--card2);

  color:white;

  border:1px solid var(--border);

}


.shopping-button:hover{

  background:#22334b;

}


/* =========================
   EMPTY CART
========================= */

.empty-cart{

  min-height:420px;

  display:flex;

  flex-direction:column;

  align-items:center;

  justify-content:center;

  text-align:center;

  padding:30px;

  background:var(--card);

  border:1px solid var(--border);

  border-radius:22px;

}


.empty-icon{

  width:80px;

  height:80px;

  display:flex;

  align-items:center;

  justify-content:center;

  border-radius:50%;

  background:var(--card2);

  font-size:38px;

  margin-bottom:18px;

}


.empty-cart h2{

  margin-bottom:8px;

}


.empty-cart p{

  color:var(--muted);

  font-size:14px;

  margin-bottom:20px;

}


/* =========================
   CART COUNT
========================= */

.cart-count{

  display:inline-flex;

  align-items:center;

  justify-content:center;

  min-width:23px;

  height:23px;

  padding:0 6px;

  margin-left:5px;

  border-radius:20px;

  background:var(--blue);

  color:#00111c;

  font-size:12px;

  font-weight:700;

}


/* =========================
   MOBILE
========================= */

@media(max-width:850px){

  .cart-layout{

    grid-template-columns:1fr;

  }


  .summary{

    position:static;

  }

}


@media(max-width:600px){

  header{

    padding:0 15px;

  }


  .logo{

    font-size:17px;

  }


  .logo-icon{

    width:35px;

    height:35px;

    font-size:17px;

  }


  .back-link{

    font-size:12px;

  }


  main{

    padding:22px 12px 45px;

  }


  .page-heading h1{

    font-size:23px;

  }


  .cart-item{

    align-items:flex-start;

    flex-wrap:wrap;

  }


  .product-image{

    width:85px;

    height:85px;

  }


  .item-info{

    width:calc(100% - 105px);

  }


  .item-right{

    width:100%;

    display:flex;

    align-items:center;

    justify-content:space-between;

    text-align:left;

    padding-top:10px;

    border-top:1px solid var(--border);

  }


  .item-subtotal{

    margin:0;

  }

}

</style>

</head>


<body>


<!-- HEADER -->

<header>

  <div class="logo">

    <div class="logo-icon">

      ⚡

    </div>

    DSP

  </div>


  <a

    href="shop.html"

    class="back-link"

  >

    ← Continue Shopping

  </a>

</header>


<!-- MAIN -->

<main>


  <div class="page-heading">

    <h1>

      My Cart 🛒

      <span

        class="cart-count"

        id="cart-count"

      >

        0

      </span>

    </h1>


    <p>

      Review your selected products before checkout.

    </p>

  </div>


  <div

    class="cart-layout"

    id="cart-layout"

  >


    <!-- CART ITEMS -->

    <div

      class="cart-list"

      id="cart-items"

    >

    </div>


    <!-- SUMMARY -->

    <aside

      class="summary"

      id="summary"

    >

      <h2>

        Order Summary

      </h2>


      <div

        class="summary-row"

      >

        <span>

          Items

        </span>


        <span

          id="item-count"

        >

          0

        </span>

      </div>


      <div

        class="summary-row total"

      >

        <span>

          Total

        </span>


        <span

          class="total-price"

          id="total"

        >

          ₦0

        </span>

      </div>


      <button

        class="checkout-button"

        onclick="goToCheckout()"

      >

        Proceed to Checkout

      </button>


      <button

        class="whatsapp-button"

        onclick="orderWhatsApp()"

      >

        Order via WhatsApp

      </button>


      <button

        class="shopping-button"

        onclick="continueShopping()"

      >

        Continue Shopping

      </button>

    </aside>

  </div>


</main>


<script>


/* =========================
   CART STORAGE
========================= */

function getCart(){

  try{

    return JSON.parse(

      localStorage.getItem("cart")

    ) || [];

  }

  catch(error){

    return [];

  }

}


function saveCart(cart){

  localStorage.setItem(

    "cart",

    JSON.stringify(cart)

  );

}


/* =========================
   DISPLAY CART
========================= */

function displayCart(){

  const cart = getCart();

  const cartItems =

    document.getElementById(

      "cart-items"

    );


  const summary =

    document.getElementById(

      "summary"

    );


  const cartLayout =

    document.getElementById(

      "cart-layout"

    );


  const cartCount =

    document.getElementById(

      "cart-count"

    );


  const itemCount =

    document.getElementById(

      "item-count"

    );


  let total = 0;

  let totalItems = 0;


  cartItems.innerHTML = "";


  cart.forEach(function(item){

    if(!item.qty){

      item.qty = 1;

    }


    const price =

      Number(item.price) || 0;


    const subtotal =

      price * item.qty;


    total += subtotal;

    totalItems += item.qty;


    cartItems.innerHTML += `

      <article class="cart-item">

        <img

          class="product-image"

          src="${item.image || ''}"

          alt="${item.name || 'Product'}"

        >


        <div class="item-info">

          <h3>

            ${item.name || 'Unnamed Product'}

          </h3>


          <p class="item-category">

            ${item.category || 'Danny Smart Power'}

          </p>


          <p class="item-price">

            ₦${price.toLocaleString()}

          </p>


          <div class="quantity-box">

            <button

              onclick="changeQty(${cart.indexOf(item)}, -1)"

            >

              −

            </button>


            <span>

              ${item.qty}

            </span>


            <button

              onclick="changeQty(${cart.indexOf(item)}, 1)"

            >

              +

            </button>

          </div>

        </div>


        <div class="item-right">

          <div class="item-subtotal">

            ₦${subtotal.toLocaleString()}

          </div>


          <button

            class="remove-button"

            onclick="removeItem(${cart.indexOf(item)})"

          >

            🗑 Remove

          </button>

        </div>

      </article>

    `;

  });


  cartCount.textContent = totalItems;

  itemCount.textContent = totalItems;

  document.getElementById("total").textContent =

    "₦" + total.toLocaleString();


  saveCart(cart);


  if(cart.length === 0){

    cartItems.innerHTML = `

      <div class="empty-cart">

        <div class="empty-icon">

          🛒

        </div>


        <h2>

          Your cart is empty

        </h2>


        <p>

          You have not added any products yet.

        </p>


        <button

          class="shopping-button"

          onclick="continueShopping()"

        >

          Start Shopping

        </button>

      </div>

    `;


    summary.style.display = "none";

  }

  else{

    summary.style.display = "block";

  }

}


/* =========================
   CHANGE QUANTITY
========================= */

function changeQty(index, change){

  const cart = getCart();


  if(!cart[index]){

    return;

  }


  cart[index].qty =

    (Number(cart[index].qty) || 1)

    + change;


  if(cart[index].qty <= 0){

    cart.splice(index, 1);

  }


  saveCart(cart);

  displayCart();

}


/* =========================
   REMOVE ITEM
========================= */

function removeItem(index){

  const cart = getCart();


  if(!cart[index]){

    return;

  }


  cart.splice(index, 1);


  saveCart(cart);

  displayCart();

}


/* =========================
   WHATSAPP ORDER
========================= */

function orderWhatsApp(){

  const cart = getCart();


  if(cart.length === 0){

    alert(

      "Your cart is empty."

    );

    return;

  }


  const phone =

    "2349036470778";


  let message =

    "Hello Danny Smart Power ⚡\n\n" +

    "I want to order the following products:\n\n";


  cart.forEach(function(item){

    const qty =

      Number(item.qty) || 1;


    const price =

      Number(item.price) || 0;


    message +=

      "• " +

      item.name +

      " x" +

      qty +

      " = ₦" +

      (price * qty)

      .toLocaleString() +

      "\n";

  });


  const total =

    cart.reduce(function(sum,item){

      return sum +

        (Number(item.price) || 0) *

        (Number(item.qty) || 1);

    },0);


  message +=

    "\nTotal: ₦" +

    total.toLocaleString();


  window.open(

    "https://wa.me/" +

    phone +

    "?text=" +

    encodeURIComponent(message),

    "_blank"

  );

}


/* =========================
   CHECKOUT
========================= */

function goToCheckout(){

  const cart = getCart();


  if(cart.length === 0){

    alert(

      "Your cart is empty."

    );

    return;

  }


  localStorage.setItem(

    "checkoutCart",

    JSON.stringify(cart)

  );


  window.location.href =

    "checkout.html";

}


/* =========================
   CONTINUE SHOPPING
========================= */

function continueShopping(){

  window.location.href =

    "shop.html";

}


/* =========================
   INIT
========================= */

displayCart();

</script>

</body>

</html>
