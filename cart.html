<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - Danny Smart Power</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
}

/* HEADER */
header {
  background: #020617;
  padding: 15px 8%;
  display: flex;
  justify-content: space-between;
}

a { color: white; text-decoration: none; }

/* CONTAINER */
.container {
  padding: 20px 8%;
}

/* CART ITEM */
.item {
  display: flex;
  gap: 15px;
  background: #020617;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.item img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 8px;
}

.info {
  flex: 1;
}

.price {
  color: #38bdf8;
  font-weight: bold;
}

.remove {
  background: red;
  border: none;
  padding: 5px 10px;
  cursor: pointer;
  color: white;
}

/* TOTAL */
.total {
  margin-top: 15px;
  font-size: 18px;
  font-weight: bold;
}

/* BUTTON */
.btn {
  margin-top: 10px;
  padding: 10px;
  background: #38bdf8;
  border: none;
  width: 100%;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <h2>My Cart</h2>
  <a href="shop.html">← Back to Shop</a>
</header>

<div class="container">

  <div id="cart-items"></div>

  <p class="total" id="total"></p>

  <button onclick="orderWhatsApp()" class="btn">Order on WhatsApp</button>

</div>

<script>
function getCart(){
  return JSON.parse(localStorage.getItem("cart")) || [];
}

function saveCart(cart){
  localStorage.setItem("cart", JSON.stringify(cart));
}

function displayCart(){
  let cart = getCart();
  let box = document.getElementById("cart-items");
  let total = 0;

  box.innerHTML = "";

  cart.forEach((item, index)=>{
    total += item.price;

    box.innerHTML += `
      <div class="item">
        <img src="${item.image}">
        <div class="info">
          <h4>${item.name}</h4>
          <p class="price">₦${item.price}</p>
          <button class="remove" onclick="removeItem(${index})">Remove</button>
        </div>
      </div>
    `;
  });

  document.getElementById("total").innerText = "Total: ₦" + total;
}

function removeItem(index){
  let cart = getCart();
  cart.splice(index, 1);
  saveCart(cart);
  displayCart();
}

function orderWhatsApp(){
  let cart = getCart();
  let phone = "2349150368872";
  let message = "Hello, I want to order:\n";

  cart.forEach(item=>{
    message += `- ${item.name} ₦${item.price}\n`;
  });

  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`);
}

displayCart();
</script>

</body>
</html>
