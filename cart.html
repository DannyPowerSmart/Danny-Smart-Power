<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - Danny Smart Power</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
}

/* HEADER */
header {
  background: #020617;
  padding: 15px 8%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

a { color: #38bdf8; text-decoration: none; }

/* CONTAINER */
.container {
  padding: 20px 8%;
}

/* CART ITEM */
.item {
  display: flex;
  gap: 15px;
  background: #020617;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 15px;
  align-items: center;
}

.item img {
  width: 90px;
  height: 90px;
  object-fit: cover;
  border-radius: 10px;
}

.info {
  flex: 1;
}

.price {
  color: #38bdf8;
  font-weight: bold;
}

/* QUANTITY */
.qty {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 5px;
}

.qty button {
  background: #38bdf8;
  border: none;
  padding: 5px 10px;
  cursor: pointer;
  border-radius: 5px;
}

.qty span {
  min-width: 20px;
  text-align: center;
}

/* REMOVE */
.remove {
  background: red;
  border: none;
  padding: 6px 10px;
  cursor: pointer;
  color: white;
  border-radius: 6px;
}

/* TOTAL BOX */
.summary {
  margin-top: 20px;
  background: #020617;
  padding: 15px;
  border-radius: 12px;
}

.total {
  font-size: 18px;
  font-weight: bold;
}

/* BUTTON */
.btn {
  margin-top: 10px;
  padding: 12px;
  background: #38bdf8;
  border: none;
  width: 100%;
  cursor: pointer;
  border-radius: 8px;
  font-weight: bold;
}

/* EMPTY */
.empty {
  text-align: center;
  margin-top: 50px;
  color: #aaa;
}
</style>
</head>

<body>

<header>
  <h2>My Cart 🛒</h2>
  <a href="shop.html">← Continue Shopping</a>
</header>

<div class="container">

  <div id="cart-items"></div>

  <div class="summary">
    <p class="total" id="total"></p>
    <button onclick="goToCheckout()" class="btn">Proceed to Checkout</button>
  </div>

</div>

<script>
function getCart(){
  return JSON.parse(localStorage.getItem("cart")) || [];
}

function saveCart(cart){
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* DISPLAY CART */
function displayCart(){
  let cart = getCart();
  let box = document.getElementById("cart-items");
  let total = 0;

  box.innerHTML = "";

  if(cart.length === 0){
    box.innerHTML = `<p class="empty">Your cart is empty 🛒</p>`;
    document.getElementById("total").innerText = "";
    return;
  }

  cart.forEach((item, index)=>{

    if(!item.qty) item.qty = 1;

    let subtotal = item.price * item.qty;
    total += subtotal;

    box.innerHTML += `
      <div class="item">
        <img src="${item.image}">
        
        <div class="info">
          <h4>${item.name}</h4>
          <p class="price">₦${item.price}</p>

          <div class="qty">
            <button onclick="changeQty(${index}, -1)">-</button>
            <span>${item.qty}</span>
            <button onclick="changeQty(${index}, 1)">+</button>
          </div>

          <p>Subtotal: ₦${subtotal}</p>
        </div>

        <button class="remove" onclick="removeItem(${index})">X</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = "Total: ₦" + total;

  saveCart(cart);
}

/* CHANGE QUANTITY */
function changeQty(index, change){
  let cart = getCart();

  cart[index].qty = (cart[index].qty || 1) + change;

  if(cart[index].qty <= 0){
    cart.splice(index, 1);
  }

  saveCart(cart);
  displayCart();
}

/* REMOVE */
function removeItem(index){
  let cart = getCart();
  cart.splice(index, 1);
  saveCart(cart);
  displayCart();
}

/* WHATSAPP ORDER */
function orderWhatsApp(){
  let cart = getCart();
  let phone = "2349036470778";
  let message = "Hello, I want to order:\n\n";

  cart.forEach(item=>{
    message += `- ${item.name} x${item.qty} = ₦${item.price * item.qty}\n`;
  });

  let total = cart.reduce((sum, item)=> sum + (item.price * item.qty), 0);
  message += `\nTotal: ₦${total}`;

  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`);
}

displayCart();

  function goToCheckout(){
  let cart = getCart();

  if(cart.length === 0){
    alert("Your cart is empty");
    return;
  }

  localStorage.setItem("checkoutCart", JSON.stringify(cart));
  window.location.href = "checkout.html";
  }
</script>

</body>
</html>
