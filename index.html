<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Danny Smart Power</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0f172a;
      color: #fff;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 10%;
      background: #020617;
    }

    header h1 { color: #38bdf8; }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      background: linear-gradient(to right, #020617, #0ea5e9);
    }

    .hero h2 {
      font-size: 42px;
      margin-bottom: 20px;
    }

    .hero p {
      max-width: 600px;
      margin: auto;
    }

    /* BUTTONS */
    .buttons {
      margin-top: 25px;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 22px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn-primary {
      background: #38bdf8;
      color: #000;
    }

    .btn-secondary {
      background: #fff;
      color: #0f172a;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    footer {
      background: #020617;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>DSP</h1>
</header>

<section class="hero">
  <div>
    <h2>Danny Smart Power</h2>

    <p>
      We provide smart electrical solutions, solar installation,
      and modern power systems for homes and businesses.
    </p>

    <!-- NEW BUTTONS -->
    <div class="buttons">
      <a href="shop.html" class="btn btn-primary">🛒 Shop Electrical Products</a>
      <a href="service.html" class="btn btn-secondary">⚡ Request Electrical Service</a>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 Danny Smart Power. All rights reserved.</p>
</footer>

</body>
</html>
