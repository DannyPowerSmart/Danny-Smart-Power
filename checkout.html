<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Danny Smart Power</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
}

/* HEADER */
header {
  background: #020617;
  padding: 15px 8%;
  display: flex;
  justify-content: space-between;
}

a { color: #38bdf8; text-decoration: none; }

/* CONTAINER */
.container {
  padding: 20px 8%;
}

/* FORM */
form {
  background: #020617;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background: #0f172a;
  color: white;
}

textarea {
  resize: none;
}

/* SUMMARY */
.summary {
  background: #020617;
  padding: 15px;
  border-radius: 12px;
}

.item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.total {
  font-weight: bold;
  margin-top: 10px;
}

/* BUTTON */
.btn {
  margin-top: 15px;
  padding: 12px;
  background: #38bdf8;
  border: none;
  width: 100%;
  cursor: pointer;
  border-radius: 8px;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
  <h2>Checkout</h2>
  <a href="cart.html">← Back to Cart</a>
</header>

<div class="container">

  <!-- CUSTOMER INFO -->
  <form id="checkout-form">
    <h3>Delivery Details</h3>

    <input type="text" id="name" placeholder="Full Name" required>
    <input type="tel" id="phone" placeholder="Phone Number" required>
    <input type="text" id="address" placeholder="Delivery Address" required>
    <textarea id="note" rows="3" placeholder="Additional Note (Optional)"></textarea>
  </form>

  <!-- ORDER SUMMARY -->
  <div class="summary">
    <h3>Order Summary</h3>
    <div id="summary-items"></div>
    <p class="total" id="total"></p>

    <button class="btn" onclick="placeOrder()">Place Order</button>
  </div>

</div>

<script>
function getCart(){
  return JSON.parse(localStorage.getItem("checkoutCart")) || [];
}

function loadSummary(){
  let cart = getCart();
  let box = document.getElementById("summary-items");
  let total = 0;

  box.innerHTML = "";

  cart.forEach(item=>{
    let subtotal = item.price * item.qty;
    total += subtotal;

    box.innerHTML += `
      <div class="item">
        <span>${item.name} x${item.qty}</span>
        <span>₦${subtotal}</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = "Total: ₦" + total;
}

function placeOrder(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;
  let note = document.getElementById("note").value;

  if(!name || !phone || !address){
    alert("Please fill all required fields");
    return;
  }

  let cart = getCart();

  let message = `*New Order*%0A%0A`;
  message += `Name: ${name}%0A`;
  message += `Phone: ${phone}%0A`;
  message += `Address: ${address}%0A`;

  if(note){
    message += `Note: ${note}%0A`;
  }

  message += `%0A*Order Details*%0A`;

  let total = 0;

  cart.forEach(item=>{
    let subtotal = item.price * item.qty;
    total += subtotal;

    message += `- ${item.name} x${item.qty} = ₦${subtotal}%0A`;
  });

  message += `%0ATotal: ₦${total}`;

  let adminPhone = "2349036470778";

  function placeOrder(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;
  let note = document.getElementById("note").value;

  if(!name || !phone || !address){
    alert("Please fill all required fields");
    return;
  }

  let cart = getCart();
  let total = 0;

  cart.forEach(item=>{
    total += item.price * item.qty;
  });

  // 🔥 SAVE TO FIREBASE
  db.collection("orders").add({
    name: name,
    phone: phone,
    address: address,
    note: note,
    cart: cart,
    total: total,
    status: "pending",
    createdAt: new Date()
  })
  .then(()=>{
    alert("Order placed successfully!");

    // WhatsApp message
    let message = `*New Order*%0A%0A`;
    message += `Name: ${name}%0A`;
    message += `Phone: ${phone}%0A`;
    message += `Address: ${address}%0A`;

    if(note){
      message += `Note: ${note}%0A`;
    }

    message += `%0A*Order Details*%0A`;

    cart.forEach(item=>{
      message += `- ${item.name} x${item.qty} = ₦${item.price * item.qty}%0A`;
    });

    message += `%0ATotal: ₦${total}`;

    let adminPhone = "2349036470778";
    window.open(`https://wa.me/${adminPhone}?text=${message}`);

    // Clear cart
    localStorage.removeItem("cart");
    localStorage.removeItem("checkoutCart");

    window.location.href = "orders.html";
  })
  .catch((error)=>{
    console.error(error);
    alert("Error placing order");
  });
  }
  
  // SAVE ORDER
let orders = JSON.parse(localStorage.getItem("orders")) || [];

orders.push({
  name,
  phone,
  address,
  note,
  cart,
  total,
  date: new Date().toLocaleString()
});

localStorage.setItem("orders", JSON.stringify(orders));

  // Optional: clear cart after order
  localStorage.removeItem("cart");
  localStorage.removeItem("checkoutCart");
}

loadSummary();
</script>

</body>
</html>
